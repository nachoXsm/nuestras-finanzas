<style>
  /* LOCK SCREEN */
  #lockScreen {
    position: fixed; inset: 0; background: var(--bg); z-index: 9999;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 20px; padding: 40px;
  }
  .lock-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 2rem; text-align: center; }
  .lock-logo span { color: var(--accent); }
  .lock-subtitle { font-size: 0.8rem; color: var(--muted); text-align: center; margin-top: -12px; }
  .lock-icon {
    width: 80px; height: 80px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent2), #5a40d4);
    display: flex; align-items: center; justify-content: center;
    font-size: 2.2rem; cursor: pointer;
    box-shadow: 0 0 0 0 rgba(123,97,255,0.4);
    animation: lockPulse 2s infinite;
    border: none; transition: transform 0.15s;
  }
  .lock-icon:active { transform: scale(0.93); }
  @keyframes lockPulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(123,97,255,0.4); }
    50% { box-shadow: 0 0 0 16px rgba(123,97,255,0); }
  }
  .lock-msg { font-size: 0.85rem; color: var(--muted); text-align: center; }
  .lock-pin-wrap { display: none; flex-direction: column; align-items: center; gap: 14px; width: 100%; max-width: 280px; }
  .pin-dots { display: flex; gap: 12px; justify-content: center; }
  .pin-dot {
    width: 14px; height: 14px; border-radius: 50%;
    border: 2px solid var(--border); background: transparent;
    transition: all 0.2s;
  }
  .pin-dot.filled { background: var(--accent2); border-color: var(--accent2); }
  .pin-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 10px; width: 100%;
  }
  .pin-btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 12px; padding: 16px;
    font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 700;
    cursor: pointer; transition: all 0.15s; text-align: center;
  }
  .pin-btn:active { background: var(--accent2); transform: scale(0.95); }
  .lock-error { color: var(--red); font-size: 0.8rem; min-height: 18px; }
  .pin-hint { font-size: 0.72rem; color: var(--muted); text-align: center; }
</style>

<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1929;
    --surface2: #232235;
    --border: #2e2d45;
    --accent: #e8c547;
    --accent2: #7b61ff;
    --green: #4ecca3;
    --red: #ff6b6b;
    --text: #eeeef7;
    --muted: #7b7a96;
    --card: #1e1d30;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 20% 10%, rgba(123,97,255,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 90%, rgba(232,197,71,0.05) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }
  .app { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 16px 12px 80px; width: 100%; }

  /* LOADER */
  #loader {
    position: fixed; inset: 0; background: var(--bg); z-index: 999;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
  }
  .loader-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.8rem; }
  .loader-logo span { color: var(--accent); }
  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--accent2); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-text { font-size: 0.8rem; color: var(--muted); }

  /* HEADER */
  header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 20px; padding-bottom: 16px;
    border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 10px;
  }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.25rem; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .month-selector select {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 6px 10px; border-radius: 8px;
    font-family: 'DM Mono', monospace; font-size: 0.8rem; cursor: pointer; max-width: 150px;
  }
  .sync-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--green);
    flex-shrink: 0; transition: background 0.3s;
  }
  .sync-dot.syncing { background: var(--accent); animation: pulse 1s infinite; }
  .sync-dot.error { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* SUMMARY */
  .summary-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 20px; }
  .sum-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px;
  }
  .sum-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 6px; }
  .sum-value { font-family: 'Syne', sans-serif; font-size: 1.35rem; font-weight: 700; }
  .sum-value.green { color: var(--green); }
  .sum-value.red { color: var(--red); }
  .sum-value.yellow { color: var(--accent); }
  .sum-value.purple { color: var(--accent2); }
  .sum-sub { font-size: 0.72rem; color: var(--muted); margin-top: 3px; }
  .progress-bar { background: var(--surface2); border-radius: 99px; height: 5px; margin-top: 7px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 99px; transition: width 0.5s ease; }

  /* TABS */
  .tabs { display: flex; gap: 3px; margin-bottom: 18px; background: var(--surface); border-radius: 12px; padding: 4px; }
  .tab {
    flex: 1 1 0; text-align: center; padding: 8px 4px;
    font-size: 0.7rem; font-weight: 500; border-radius: 9px;
    cursor: pointer; transition: all 0.2s; color: var(--muted); border: none;
    background: transparent; font-family: 'DM Sans', sans-serif; white-space: nowrap;
  }
  .tab.active { background: var(--accent2); color: white; }

  /* SECTION */
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .section-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem; }
  .btn-add {
    background: var(--accent); color: var(--bg); border: none;
    padding: 8px 14px; border-radius: 8px; font-weight: 600;
    font-size: 0.8rem; cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: opacity 0.2s;
  }
  .btn-add:hover { opacity: 0.85; }
  .btn-add.green { background: var(--green); }

  /* FORM */
  .form-panel {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px; margin-bottom: 14px; display: none;
  }
  .form-panel.open { display: block; animation: slideDown 0.2s ease; }
  @keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
  .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px,1fr)); gap: 8px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-family: 'DM Mono', monospace; }
  .form-group input, .form-group select {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 8px 10px; border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 0.85rem; transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent2); }
  .form-actions { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }
  .btn-save { background: var(--accent2); color: white; border: none; padding: 8px 18px; border-radius: 8px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; }
  .btn-cancel { background: transparent; color: var(--muted); border: 1px solid var(--border); padding: 8px 14px; border-radius: 8px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; }

  /* ITEMS */
  .expense-list { display: flex; flex-direction: column; gap: 7px; }
  .expense-item {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 14px;
    display: flex; align-items: center; gap: 10px;
    transition: border-color 0.2s;
  }
  .cat-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .exp-info { flex: 1; min-width: 0; }
  .exp-name { font-weight: 500; font-size: 0.88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .exp-meta { font-size: 0.72rem; color: var(--muted); margin-top: 2px; display: flex; gap: 6px; flex-wrap: wrap; }
  .badge { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 99px; font-size: 0.65rem; font-weight: 500; font-family: 'DM Mono', monospace; }
  .badge-fixed { background: rgba(123,97,255,0.15); color: var(--accent2); }
  .badge-card { background: rgba(232,197,71,0.12); color: var(--accent); }
  .badge-cash { background: rgba(78,204,163,0.12); color: var(--green); }
  .exp-amount { font-family: 'DM Mono', monospace; font-weight: 500; font-size: 0.9rem; white-space: nowrap; }
  .btn-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.9rem; padding: 4px; transition: color 0.2s; line-height: 1; }
  .btn-del:hover { color: var(--red); }

  /* CARDS TAB */
  .card-block { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 10px; }
  .card-block-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .card-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem; }
  .card-total { font-family: 'DM Mono', monospace; color: var(--accent); font-size: 1rem; }
  .card-item { display: flex; justify-content: space-between; font-size: 0.82rem; padding: 4px 0; border-bottom: 1px solid var(--border); }
  .card-item:last-child { border-bottom: none; }

  /* CAT BREAKDOWN */
  .cat-breakdown { display: grid; gap: 8px; }
  .cat-row { display: flex; align-items: center; gap: 8px; }
  .cat-label { font-size: 0.78rem; width: 100px; flex-shrink: 0; }
  .cat-bar-wrap { flex: 1; background: var(--surface2); border-radius: 99px; height: 6px; overflow: hidden; }
  .cat-bar { height: 100%; border-radius: 99px; }
  .cat-amount { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--muted); width: 75px; text-align: right; }

  /* FLUJO */
  .savings-panel {
    background: linear-gradient(135deg, rgba(123,97,255,0.12), rgba(232,197,71,0.06));
    border: 1px solid rgba(123,97,255,0.3); border-radius: 14px; padding: 20px; margin-bottom: 18px;
  }
  .savings-title { font-family: 'Syne', sans-serif; font-weight: 700; margin-bottom: 14px; font-size: 0.95rem; }
  .savings-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .savings-row:last-child { border-bottom: none; }
  .savings-label { color: var(--muted); font-size: 0.82rem; }
  .savings-val { font-family: 'DM Mono', monospace; font-size: 0.88rem; }
  .highlight-row .savings-label { color: var(--text); font-weight: 500; }
  .highlight-row .savings-val { color: var(--green); font-size: 1rem; font-weight: 600; }

  /* INFORME */
  canvas { max-width: 100%; display: block; }

  /* EMPTY */
  .empty { text-align: center; color: var(--muted); padding: 30px; font-size: 0.85rem; }
  .empty-icon { font-size: 1.8rem; margin-bottom: 8px; }

  /* TAB CONTENT */
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 10px 20px; border-radius: 10px;
    font-size: 0.82rem; z-index: 100; opacity: 0; transition: opacity 0.3s;
    pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  @media(max-width:400px) {
    .summary-grid { grid-template-columns: 1fr 1fr; }
    .sum-value { font-size: 1.1rem; }
  }
</style>
</head>

    <div class="form-panel" id="formGasto">

        <div class="form-group">
          <label>Descripción</label>
          <input type="text" id="g_desc" placeholder="Ej: Alquiler">
        </div>
        <div class="form-group">
          <label>Monto</label>
          <input type="number" id="g_monto" placeholder="0">
        </div>
        <div class="form-group">
          <label>Categoría</label>
          <select id="g_cat">
            <option value="Vivienda">🏠 Vivienda</option>
            <option value="Alimentación">🛒 Alimentación</option>
            <option value="Transporte">🚗 Transporte</option>
            <option value="Salud">💊 Salud</option>
            <option value="Educación">📚 Educación</option>

            <option value="Suscripciones">📱 Suscripciones</option>

          <select id="g_tarjeta"></select>
        </div>
        <div class="form-group">
          <label>¿Quién paga?</label>
          <select id="g_quien">

        <div class="form-group">

        <button class="btn-save" onclick="addGasto()">Guardar</button>

    <div class="expense-list" id="gastoList"></div>

  <!-- TAB: TARJETAS -->
  <div class="tab-content" id="tab-tarjetas">

      <button class="btn-add" onclick="toggleForm('formTarjeta')">+ Agregar</button>

        </div>

      <div class="form-actions">
        <button class="btn-cancel" onclick="toggleForm('formTarjeta')">Cancelar</button>

  <!-- TAB: CATEGORIAS -->

<div class="toast" id="toast"></div>

<script>
// ================================================
// CONFIG SUPABASE
// ================================================
const SUPABASE_URL = 'https://gzjhohwuyquumkgiehan.supabase.co';
const SUPABASE_KEY = 'sb_publishable_2YKu-8E5kpmXYpWs9eOjNw_C4QNFJnO';
const API = SUPABASE_URL + '/rest/v1';
const HEADERS = {
  'Content-Type': 'application/json',
  'apikey': SUPABASE_KEY,
  'Authorization': 'Bearer ' + SUPABASE_KEY,
  'Prefer': 'return=representation'
};

async function dbGet(table, params = '') {
  const r = await fetch(`${API}/${table}?${params}&order=created_at.asc`, { headers: HEADERS });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function dbPost(table, body) {
  const r = await fetch(`${API}/${table}`, { method: 'POST', headers: HEADERS, body: JSON.stringify(body) });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function dbDelete(table, id) {
  const r = await fetch(`${API}/${table}?id=eq.${id}`, { method: 'DELETE', headers: { ...HEADERS, 'Prefer': 'return=minimal' } });
  if (!r.ok) throw new Error(await r.text());
}

// ================================================
// STATE
// ================================================
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const CAT_COLORS = {
  'Vivienda':'#7b61ff','Alimentación':'#4ecca3','Transporte':'#e8c547','Salud':'#ff6b6b',
  'Educación':'#61b3ff','Entretenimiento':'#ff9f43','Servicios':'#a29bfe','Ropa':'#fd79a8',
  'Mascota':'#55efc4','Suscripciones':'#fdcb6e','Otros':'#b2bec3'
};

let state = {
  mes: new Date().getMonth() + 1,
  anio: new Date().getFullYear(),
  ingresos: [], gastos: [], tarjetas: []
};

function setSyncing(s) {
  const dot = document.getElementById('syncDot');
  dot.className = 'sync-dot' + (s === 'syncing' ? ' syncing' : s === 'error' ? ' error' : '');
}

function showToast(msg, ms = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

// ================================================
// LOAD DATA
// ================================================
async function loadAll() {
  setSyncing('syncing');
  try {
    const [tarjetas, ingresos, gastos] = await Promise.all([
      dbGet('tarjetas'),
      dbGet('ingresos', `mes=eq.${state.mes}&anio=eq.${state.anio}`),
      dbGet('gastos', `mes=eq.${state.mes}&anio=eq.${state.anio}`)
    ]);
    state.tarjetas = tarjetas;
    state.ingresos = ingresos;
    state.gastos = gastos;
    setSyncing('ok');
    renderAll();
  } catch(e) {
    setSyncing('error');
    showToast('❌ Error al conectar con la nube');
    console.error(e);
  }
}

// ================================================
// MONTH SELECTOR
// ================================================
function buildMonthSelector() {
  const sel = document.getElementById('monthSel');
  const now = new Date();
  for (let i = -3; i <= 3; i++) {
    let d = new Date(now.getFullYear(), now.getMonth() + i, 1);
    const opt = document.createElement('option');
    opt.value = `${d.getFullYear()}-${d.getMonth()+1}`;
    opt.textContent = `${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
    if (d.getMonth()+1 === state.mes && d.getFullYear() === state.anio) opt.selected = true;
    sel.appendChild(opt);
  }
}
function changeMonth() {
  const [y, m] = document.getElementById('monthSel').value.split('-');
  state.anio = parseInt(y); state.mes = parseInt(m);
  loadAll();
}

// ================================================
// FORMS
// ================================================
function toggleForm(id) {
  document.getElementById(id).classList.toggle('open');
  updateCardSelect();
}
function toggleCardSelect() {
  const show = document.getElementById('g_medio').value === 'tarjeta';
  document.getElementById('cardSelectGroup').style.display = show ? 'flex' : 'none';
}
function updateCardSelect() {
  const sel = document.getElementById('g_tarjeta');
  sel.innerHTML = state.tarjetas.length === 0
    ? '<option disabled>(sin tarjetas)</option>'
    : state.tarjetas.map(t => `<option value="${t.id}">${t.nombre}</option>`).join('');
}

async function addIngreso() {
  const descripcion = document.getElementById('i_desc').value.trim();
  const monto = parseFloat(document.getElementById('i_monto').value);
  if (!descripcion || !monto) return showToast('Completá descripción y monto');
  setSyncing('syncing');
  try {
    const row = await dbPost('ingresos', {
      mes: state.mes, anio: state.anio, descripcion, monto,
      quien: document.getElementById('i_quien').value,
      tipo: document.getElementById('i_tipo').value
    });
    state.ingresos.push(row[0]);
    document.getElementById('i_desc').value = '';
    document.getElementById('i_monto').value = '';
    document.getElementById('formIngreso').classList.remove('open');
    setSyncing('ok'); showToast('✅ Ingreso guardado');
    renderAll();
  } catch(e) { setSyncing('error'); showToast('❌ Error al guardar'); }
}

async function deleteIngreso(id) {
  setSyncing('syncing');
  try {
    await dbDelete('ingresos', id);
    state.ingresos = state.ingresos.filter(i => i.id !== id);
    setSyncing('ok'); renderAll();
  } catch(e) { setSyncing('error'); showToast('❌ Error al eliminar'); }
}

async function addGasto() {
  const descripcion = document.getElementById('g_desc').value.trim();
  const monto = parseFloat(document.getElementById('g_monto').value);
  if (!descripcion || !monto) return showToast('Completá descripción y monto');
  const medio = document.getElementById('g_medio').value;
  const tarjeta_id = medio === 'tarjeta' ? document.getElementById('g_tarjeta').value : null;
  setSyncing('syncing');
  try {
    const row = await dbPost('gastos', {
      mes: state.mes, anio: state.anio, descripcion, monto,
      cat: document.getElementById('g_cat').value,
      tipo: document.getElementById('g_tipo').value,
      medio, tarjeta_id,
      quien: document.getElementById('g_quien').value,
      dia: parseInt(document.getElementById('g_dia').value) || null
    });
    state.gastos.push(row[0]);
    document.getElementById('g_desc').value = '';
    document.getElementById('g_monto').value = '';
    document.getElementById('formGasto').classList.remove('open');
    setSyncing('ok'); showToast('✅ Gasto guardado');
    renderAll();
  } catch(e) { setSyncing('error'); showToast('❌ Error al guardar'); }
}

async function deleteGasto(id) {
  setSyncing('syncing');
  try {
    await dbDelete('gastos', id);
    state.gastos = state.gastos.filter(g => g.id !== id);
    setSyncing('ok'); renderAll();
  } catch(e) { setSyncing('error'); showToast('❌ Error al eliminar'); }
}

async function addTarjeta() {
  const nombre = document.getElementById('t_nombre').value.trim();
  if (!nombre) return showToast('Ingresá el nombre de la tarjeta');
  setSyncing('syncing');
  try {
    const row = await dbPost('tarjetas', {
      nombre,
      cierre: parseInt(document.getElementById('t_cierre').value) || null,
      vencimiento: parseInt(document.getElementById('t_venc').value) || null,
      titular: document.getElementById('t_titular').value
    });
    state.tarjetas.push(row[0]);
    document.getElementById('t_nombre').value = '';
    document.getElementById('formTarjeta').classList.remove('open');
    setSyncing('ok'); showToast('✅ Tarjeta guardada');
    renderAll();
  } catch(e) { setSyncing('error'); showToast('❌ Error al guardar'); }
}

async function deleteTarjeta(id) {
  setSyncing('syncing');
  try {
    await dbDelete('tarjetas', id);
    state.tarjetas = state.tarjetas.filter(t => t.id !== id);
    setSyncing('ok'); renderAll();
  } catch(e) { setSyncing('error'); showToast('❌ Error al eliminar'); }
}

function drawDonut(id, labels, data, colors) {
  const canvas = document.getElementById(id); if (!canvas) return;
  const W = canvas.width = canvas.offsetWidth, H = canvas.height = 130;
  const ctx = canvas.getContext('2d');
  const total = data.reduce((a,b)=>a+b,0);
  if (!total) { ctx.fillStyle='#7b7a96'; ctx.font='11px DM Sans'; ctx.textAlign='center'; ctx.fillText('Sin datos',W/2,H/2); return; }
  const cx=W/2,cy=H/2,r=Math.min(cx,cy)-8,inner=r*0.55;
  let angle=-Math.PI/2;
  data.forEach((val,i) => {
    if (!val) return;
    const slice=(val/total)*Math.PI*2;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,angle,angle+slice); ctx.closePath();
    ctx.fillStyle=colors[i]; ctx.fill(); angle+=slice;
  });
  ctx.beginPath(); ctx.arc(cx,cy,inner,0,Math.PI*2); ctx.fillStyle='#1e1d30'; ctx.fill();
  ctx.fillStyle='#eeeef7'; ctx.font='bold 11px Syne'; ctx.textAlign='center'; ctx.fillText(fmt(total),cx,cy+4);
}

function drawBars(id, labels, data, colors) {
  const canvas = document.getElementById(id); if (!canvas) return;
  const W = canvas.width = canvas.offsetWidth, H = canvas.height = 150;
  const ctx = canvas.getContext('2d');
  if (!data.length) return;
  const max = Math.max(...data), pad = 6, barW = Math.floor((W-pad*(labels.length+1))/labels.length), chartH = H-24;
  data.forEach((val,i) => {
    const x=pad+i*(barW+pad), barH=max>0?Math.round((val/max)*chartH*0.85):0, y=chartH-barH;
    ctx.fillStyle=colors[i]+'88'; ctx.beginPath(); ctx.roundRect(x,y,barW,barH,[4,4,0,0]); ctx.fill();
    ctx.fillStyle=colors[i]; ctx.beginPath(); ctx.roundRect(x,y,barW,Math.min(4,barH),[4,4,0,0]); ctx.fill();
    ctx.fillStyle='#7b7a96'; ctx.font='8px DM Sans'; ctx.textAlign='center';
    ctx.fillText((labels[i]||'').slice(0,5), x+barW/2, H-3);
  });
}

function drawBarsH(id, labels, data, colors) {
  const canvas = document.getElementById(id); if (!canvas) return;
  const W = canvas.width = canvas.offsetWidth, H = canvas.height = 95;
  const ctx = canvas.getContext('2d');
  const max = Math.max(...data,1), labelW=55, pad=6, rowH=Math.floor((H-pad*(labels.length+1))/labels.length);
  data.forEach((val,i) => {
    const y=pad+i*(rowH+pad), barW=Math.round((val/max)*(W-labelW-pad*2));
    ctx.fillStyle=colors[i]+'44'; ctx.beginPath(); ctx.roundRect(labelW,y,W-labelW-pad,rowH,4); ctx.fill();
    if (barW>0) { ctx.fillStyle=colors[i]; ctx.beginPath(); ctx.roundRect(labelW,y,barW,rowH,4); ctx.fill(); }
    ctx.fillStyle='#eeeef7'; ctx.font='10px DM Sans'; ctx.textAlign='right'; ctx.fillText(labels[i],labelW-5,y+rowH/2+4);
    ctx.fillStyle='#7b7a96'; ctx.font='8px DM Mono'; ctx.textAlign='left'; ctx.fillText(fmt(val),labelW+barW+5,y+rowH/2+4);
  });
}

function exportExcel() {
  const { gastos, ingresos, tarjetas } = state;
  const mes = MONTHS[state.mes-1] + ' ' + state.anio;
  const wb = XLSX.utils.book_new();
  const totalIncome = ingresos.reduce((a,i)=>a+parseFloat(i.monto),0);
  const totalGastos = gastos.reduce((a,g)=>a+parseFloat(g.monto),0);
  const fijos = gastos.filter(g=>g.tipo==='fijo').reduce((a,g)=>a+parseFloat(g.monto),0);

  const ws1 = XLSX.utils.aoa_to_sheet([
    ['NuestrasFinanzas — ' + mes],[], 
    ['RESUMEN',''],
    ['Total Ingresos', totalIncome],
    ['Total Gastos', totalGastos],
    ['Gastos Fijos', fijos],
    ['Gastos Variables', totalGastos-fijos],
    ['Saldo / Ahorro', totalIncome-totalGastos],
    ['% gastado', totalIncome>0?Math.round(totalGastos/totalIncome*100)+'%':'—'],
  ]);
  ws1['!cols']=[{wch:28},{wch:16}];
  XLSX.utils.book_append_sheet(wb, ws1, 'Resumen');

  const ws2 = XLSX.utils.aoa_to_sheet([['Descripción','Monto','Quién','Tipo'], ...ingresos.map(i=>[i.descripcion,parseFloat(i.monto),i.quien,i.tipo]), [],['TOTAL',totalIncome]]);
  ws2['!cols']=[{wch:26},{wch:13},{wch:13},{wch:11}];
  XLSX.utils.book_append_sheet(wb, ws2, 'Ingresos');

  const ws3 = XLSX.utils.aoa_to_sheet([['Descripción','Monto','Categoría','Tipo','Medio','Quién','Día'],
    ...[...gastos].sort((a,b)=>(a.dia||99)-(b.dia||99)).map(g=>{
      const t = g.tarjeta_id ? tarjetas.find(t=>t.id===g.tarjeta_id)?.nombre||'Tarjeta' : '—';
      return [g.descripcion,parseFloat(g.monto),g.cat,g.tipo,g.medio==='tarjeta'?t:'Efectivo/Déb.',g.quien,g.dia||''];
    }), [],['TOTAL',totalGastos]]);
  ws3['!cols']=[{wch:26},{wch:11},{wch:15},{wch:10},{wch:17},{wch:11},{wch:5}];
  XLSX.utils.book_append_sheet(wb, ws3, 'Gastos');

  const catTotals={};
  gastos.forEach(g=>{catTotals[g.cat]=(catTotals[g.cat]||0)+parseFloat(g.monto);});
  const ws4 = XLSX.utils.aoa_to_sheet([['Categoría','Monto','% del total'],
    ...Object.entries(catTotals).sort((a,b)=>b[1]-a[1]).map(([cat,m])=>[cat,m,totalGastos>0?Math.round(m/totalGastos*100)+'%':'—'])]);
  ws4['!cols']=[{wch:18},{wch:13},{wch:12}];
  XLSX.utils.book_append_sheet(wb, ws4, 'Por Categoría');

  XLSX.writeFile(wb, `NuestrasFinanzas_${MONTHS[state.mes-1]}_${state.anio}.xlsx`);
  showToast('✅ Excel descargado');
}

async function init() {
  buildMonthSelector();
  try {
    await loadAll();
    document.getElementById('loader').style.display = 'none';
    document.getElementById('appMain').style.display = 'block';
  } catch(e) {
    document.querySelector('.loader-text').textContent = '❌ Error de conexión. Revisá tu internet.';
  }
}
// init() is called by auth unlock

// ================================================
// AUTH: BIOMETRIC + PIN
// ================================================
const DEFAULT_PIN = '1234';
const PIN_KEY = 'nf_pin_hash';
const SESSION_KEY = 'nf_session';
const SESSION_MINS = 30;

function hashPin(pin) {
  let h = 0;
  for (let i=0; i<pin.length; i++) h = Math.imul(31,h)+pin.charCodeAt(i)|0;
  return h.toString(36);
}

function isSessionActive() {
  const s = sessionStorage.getItem(SESSION_KEY);
  if (!s) return false;
  return (Date.now() - parseInt(s)) < SESSION_MINS * 60 * 1000;
}

function unlock() {
  sessionStorage.setItem(SESSION_KEY, Date.now().toString());
  const lock = document.getElementById('lockScreen');
  lock.style.transition = 'opacity 0.4s';
  lock.style.opacity = '0';
  setTimeout(() => { lock.style.display = 'none'; init(); }, 400);
}

async function tryBiometric() {
  // Check if WebAuthn available
  if (window.PublicKeyCredential) {
    try {
      const available = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
      if (available) {
        // Try to get credential
        const stored = localStorage.getItem('nf_cred_id');
        if (stored) {
          // Authenticate with existing credential
          const credId = Uint8Array.from(atob(stored), c => c.charCodeAt(0));
          const assertion = await navigator.credentials.get({
            publicKey: {
              challenge: crypto.getRandomValues(new Uint8Array(32)),
              allowCredentials: [{ id: credId, type: 'public-key' }],
              userVerification: 'required',
              timeout: 60000
            }
          });
          if (assertion) { unlock(); return; }
        } else {
          // Register biometric for first time
          document.getElementById('lockMsg').textContent = 'Registrando biometría por primera vez…';
          const reg = await navigator.credentials.create({
            publicKey: {
              challenge: crypto.getRandomValues(new Uint8Array(32)),
              rp: { name: 'NuestrasFinanzas', id: location.hostname || 'localhost' },
              user: { id: new Uint8Array(16), name: 'nacho-celi', displayName: 'Nacho & Celi' },
              pubKeyCredParams: [{ alg: -7, type: 'public-key' }, { alg: -257, type: 'public-key' }],
              authenticatorSelection: { authenticatorAttachment: 'platform', userVerification: 'required' },
              timeout: 60000
            }
          });
          if (reg) {
            const credIdB64 = btoa(String.fromCharCode(...new Uint8Array(reg.rawId)));
            localStorage.setItem('nf_cred_id', credIdB64);
            unlock(); return;
          }
        }
      }
    } catch(e) {
      console.log('Biometric failed, falling back to PIN', e.message);
    }
  }
  // Fallback to PIN
  showPin();
}

function showPin() {
  document.getElementById('biometricBtn').style.display = 'none';
  document.getElementById('lockMsg').style.display = 'none';
  document.getElementById('pinWrap').style.display = 'flex';
  const stored = localStorage.getItem(PIN_KEY);
  document.getElementById('pinHint').textContent = stored
    ? 'Ingresá tu PIN de 4 dígitos'
    : 'Primera vez: creá un PIN de 4 dígitos';
}

let pinBuffer = '';
function pinPress(val) {
  const errorEl = document.getElementById('pinError');
  if (val === 'del') {
    pinBuffer = pinBuffer.slice(0,-1);
  } else if (val === 'ok') {
    const stored = localStorage.getItem(PIN_KEY);
    if (!stored) {
      if (pinBuffer.length === 4) {
        localStorage.setItem(PIN_KEY, hashPin(pinBuffer));
        errorEl.textContent = '';
        unlock();
      } else { errorEl.textContent = 'El PIN debe tener 4 dígitos'; }
    } else {
      if (hashPin(pinBuffer) === stored) {
        errorEl.textContent = ''; unlock();
      } else {
        errorEl.textContent = 'PIN incorrecto';
        pinBuffer = '';
        updateDots();
      }
    }
    return;
  } else if (pinBuffer.length < 4) {
    pinBuffer += val;
  }
  updateDots();
  errorEl.textContent = '';
  // Auto submit when 4 digits entered (if PIN set)
  if (pinBuffer.length === 4 && localStorage.getItem(PIN_KEY)) {
    setTimeout(() => pinPress('ok'), 200);
  }
}

function updateDots() {
  for (let i=0; i<4; i++) {
    document.getElementById('d'+i).classList.toggle('filled', i < pinBuffer.length);
  }
}

// On load: check session or show lock
window.addEventListener('load', () => {
  if (isSessionActive()) {
    document.getElementById('lockScreen').style.display = 'none';
    init();
  } else {
    // Auto-try biometric after short delay
    setTimeout(tryBiometric, 600);
  }
});
</script>
