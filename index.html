<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NuestrasFinanzas</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="manifest" id="pwa-manifest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NuestrasFinanzas">
<style>
/* ============================================
   DESIGN TOKENS — DUAL THEME
   ============================================ */
:root {
  --radius: 14px;
  --radius-sm: 8px;
  --radius-xs: 6px;
  --font: 'Outfit', sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --orange: #f97316;
  --orange-soft: rgba(249,115,22,0.12);
  --blue: #3b82f6;
  --blue-soft: rgba(59,130,246,0.12);
  --green: #22c55e;
  --green-soft: rgba(34,197,94,0.12);
  --red: #ef4444;
  --red-soft: rgba(239,68,68,0.12);
  --purple: #a855f7;
  --purple-soft: rgba(168,85,247,0.12);
  --yellow: #eab308;
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
}

[data-theme="dark"] {
  --bg: #0a0a0f;
  --bg2: #111118;
  --surface: #16161f;
  --surface2: #1e1e2a;
  --surface3: #252535;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f4f4f8;
  --text2: #9090a8;
  --text3: #5a5a72;
  --shadow: rgba(0,0,0,0.4);
  --overlay: rgba(0,0,0,0.7);
}

[data-theme="light"] {
  --bg: #f5f5fa;
  --bg2: #ebebf5;
  --surface: #ffffff;
  --surface2: #f0f0f8;
  --surface3: #e8e8f2;
  --border: rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.12);
  --text: #0a0a1a;
  --text2: #505068;
  --text3: #9090a8;
  --shadow: rgba(0,0,0,0.08);
  --overlay: rgba(0,0,0,0.4);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  font-size: 15px;
  line-height: 1.5;
  transition: background var(--transition), color var(--transition);
}

/* ============================================
   LOADER
   ============================================ */
#loader {
  position: fixed; inset: 0; background: var(--bg); z-index: 9999;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
}
.loader-logo { font-family: var(--font); font-weight: 800; font-size: 2rem; letter-spacing: -1px; }
.loader-logo span { color: var(--orange); }
.spinner { width: 28px; height: 28px; border: 2.5px solid var(--border2); border-top-color: var(--orange); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loader-sub { font-size: 0.8rem; color: var(--text3); letter-spacing: 0.5px; }

/* ============================================
   LOCK SCREEN
   ============================================ */
#lockScreen {
  position: fixed; inset: 0; background: var(--bg); z-index: 9998;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 18px; padding: 40px 24px;
}
.lock-logo { font-weight: 800; font-size: 1.8rem; letter-spacing: -0.5px; text-align: center; }
.lock-logo span { color: var(--orange); }
.lock-sub { font-size: 0.75rem; color: var(--text3); text-align: center; margin-top: -10px; }
.lock-btn {
  width: 76px; height: 76px; border-radius: 50%;
  background: linear-gradient(135deg, var(--orange), #ea580c);
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem; cursor: pointer; border: none;
  box-shadow: 0 0 0 0 rgba(249,115,22,0.3);
  animation: lockPulse 2.5s infinite; transition: transform 0.15s;
}
.lock-btn:active { transform: scale(0.92); }
@keyframes lockPulse { 0%,100%{box-shadow:0 0 0 0 rgba(249,115,22,0.3)} 60%{box-shadow:0 0 0 18px rgba(249,115,22,0)} }
.lock-hint { font-size: 0.8rem; color: var(--text3); }

.pin-wrap { display: none; flex-direction: column; align-items: center; gap: 16px; width: 100%; max-width: 260px; }
.pin-dots { display: flex; gap: 10px; }
.pin-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--border2); background: transparent; transition: all 0.2s; }
.pin-dot.filled { background: var(--orange); border-color: var(--orange); }
.pin-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; width: 100%; }
.pin-key {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); border-radius: var(--radius-sm); padding: 15px;
  font-family: var(--font); font-size: 1.1rem; font-weight: 600;
  cursor: pointer; transition: all 0.15s; text-align: center;
}
.pin-key:active { background: var(--orange); color: white; transform: scale(0.95); }
.pin-key.ok { background: var(--orange); color: white; }
.pin-err { font-size: 0.78rem; color: var(--red); min-height: 16px; }
.pin-hint2 { font-size: 0.72rem; color: var(--text3); text-align: center; }

/* ============================================
   APP LAYOUT
   ============================================ */
.app { max-width: 480px; margin: 0 auto; padding: 0 0 100px; }

/* ============================================
   HEADER
   ============================================ */
.header {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg); border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.header-left { display: flex; flex-direction: column; }
.logo { font-weight: 800; font-size: 1.1rem; letter-spacing: -0.5px; line-height: 1; }
.logo span { color: var(--orange); }
.logo-sub { font-size: 0.65rem; color: var(--text3); margin-top: 2px; letter-spacing: 0.3px; }
.header-right { display: flex; align-items: center; gap: 8px; }

.month-nav { display: flex; align-items: center; gap: 6px; }
.month-nav button {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); width: 28px; height: 28px; border-radius: var(--radius-xs);
  font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
}
.month-nav button:hover { background: var(--surface3); }
.month-label {
  font-family: var(--mono); font-size: 0.72rem; font-weight: 500;
  color: var(--text2); background: var(--surface2); border: 1px solid var(--border);
  padding: 4px 10px; border-radius: var(--radius-xs); white-space: nowrap;
  cursor: pointer; min-width: 90px; text-align: center;
}

.theme-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); width: 32px; height: 32px; border-radius: var(--radius-xs);
  font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all var(--transition); flex-shrink: 0;
}
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; transition: background 0.3s; }
.sync-dot.syncing { background: var(--yellow); animation: pulse 1s infinite; }
.sync-dot.error { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ============================================
   SUMMARY CARDS
   ============================================ */
.summary { padding: 14px 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.sum-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px;
  transition: border-color var(--transition);
}
.sum-card:hover { border-color: var(--border2); }
.sum-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text3); font-family: var(--mono); margin-bottom: 6px; }
.sum-val { font-family: var(--mono); font-size: 1.2rem; font-weight: 500; line-height: 1; }
.sum-val.green { color: var(--green); }
.sum-val.red { color: var(--red); }
.sum-val.orange { color: var(--orange); }
.sum-val.blue { color: var(--blue); }
.sum-sub { font-size: 0.68rem; color: var(--text3); margin-top: 4px; }
.progress { background: var(--surface3); border-radius: 99px; height: 3px; margin-top: 8px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 99px; transition: width 0.5s ease; }

/* ============================================
   INCOME SECTION
   ============================================ */
.section { padding: 0 16px; margin-bottom: 4px; }
.section-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0; margin-bottom: 8px;
}
.section-title { font-weight: 700; font-size: 0.88rem; letter-spacing: -0.3px; }
.btn-primary {
  background: var(--orange); color: white; border: none;
  padding: 7px 14px; border-radius: var(--radius-sm);
  font-family: var(--font); font-size: 0.78rem; font-weight: 600;
  cursor: pointer; transition: all var(--transition); white-space: nowrap;
  display: flex; align-items: center; gap: 5px;
}
.btn-primary:hover { opacity: 0.88; }
.btn-primary.blue { background: var(--blue); }
.btn-primary.green { background: var(--green); }

/* ============================================
   FORM PANEL
   ============================================ */
.form-panel {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
  display: none; animation: fadeDown 0.2s ease;
}
.form-panel.open { display: block; }
@keyframes fadeDown { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-grid.full { grid-template-columns: 1fr; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); font-family: var(--mono); }
.field input, .field select {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 9px 11px; border-radius: var(--radius-sm);
  font-family: var(--font); font-size: 0.88rem;
  transition: border-color var(--transition); width: 100%;
}
.field input:focus, .field select:focus { outline: none; border-color: var(--orange); }
.field select option { background: var(--surface2); }
.form-actions { display: flex; gap: 8px; margin-top: 14px; justify-content: flex-end; }
.btn-save { background: var(--orange); color: white; border: none; padding: 9px 20px; border-radius: var(--radius-sm); font-family: var(--font); font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: opacity var(--transition); }
.btn-save:hover { opacity: 0.88; }
.btn-cancel { background: transparent; color: var(--text3); border: 1px solid var(--border); padding: 9px 14px; border-radius: var(--radius-sm); font-family: var(--font); font-size: 0.85rem; cursor: pointer; }

/* ============================================
   ITEM CARDS
   ============================================ */
.item-list { display: flex; flex-direction: column; gap: 6px; }
.item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 14px;
  display: flex; align-items: center; gap: 10px;
  transition: border-color var(--transition), transform var(--transition);
}
.item:hover { border-color: var(--border2); transform: translateX(2px); }
.item-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.item-info { flex: 1; min-width: 0; }
.item-name { font-weight: 600; font-size: 0.88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.2; }
.item-meta { display: flex; gap: 5px; margin-top: 4px; flex-wrap: wrap; align-items: center; }
.chip {
  display: inline-flex; align-items: center; padding: 2px 7px;
  border-radius: 99px; font-size: 0.62rem; font-weight: 600;
  font-family: var(--mono); letter-spacing: 0.3px;
}
.chip-fixed { background: var(--blue-soft); color: var(--blue); }
.chip-var { background: var(--purple-soft); color: var(--purple); }
.chip-cash { background: var(--green-soft); color: var(--green); }
.chip-card { background: var(--orange-soft); color: var(--orange); }
.chip-cuota { background: var(--yellow-soft, rgba(234,179,8,0.12)); color: var(--yellow); }
.item-amount { font-family: var(--mono); font-size: 0.9rem; font-weight: 500; white-space: nowrap; flex-shrink: 0; }
.item-actions { display: flex; gap: 4px; flex-shrink: 0; }
.btn-icon {
  background: none; border: none; color: var(--text3);
  cursor: pointer; padding: 5px; border-radius: var(--radius-xs);
  font-size: 0.85rem; transition: all var(--transition); line-height: 1;
  display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover.edit { color: var(--blue); background: var(--blue-soft); }
.btn-icon:hover.del { color: var(--red); background: var(--red-soft); }

/* ============================================
   TABS
   ============================================ */
.tabs-wrap {
  position: sticky; top: 57px; z-index: 90;
  background: var(--bg); border-bottom: 1px solid var(--border);
  padding: 0 16px;
}
.tabs { display: flex; gap: 0; overflow-x: auto; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex: 0 0 auto; padding: 12px 14px; font-size: 0.78rem; font-weight: 600;
  color: var(--text3); border: none; background: none; cursor: pointer;
  border-bottom: 2px solid transparent; transition: all var(--transition);
  font-family: var(--font); white-space: nowrap;
}
.tab.active { color: var(--orange); border-bottom-color: var(--orange); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ============================================
   CARD DETAIL (TARJETAS TAB)
   ============================================ */
.card-block {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; margin-bottom: 10px;
}
.card-block-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.card-name { font-weight: 700; font-size: 0.92rem; }
.card-meta { font-size: 0.7rem; color: var(--text3); margin-top: 2px; }
.card-total { font-family: var(--mono); color: var(--orange); font-size: 1rem; font-weight: 500; }
.card-item { display: flex; justify-content: space-between; align-items: center; font-size: 0.82rem; padding: 6px 0; border-bottom: 1px solid var(--border); }
.card-item:last-child { border-bottom: none; }

/* ============================================
   CAT BARS
   ============================================ */
.cat-list { display: flex; flex-direction: column; gap: 10px; }
.cat-row { display: flex; align-items: center; gap: 10px; }
.cat-name { font-size: 0.78rem; width: 95px; flex-shrink: 0; color: var(--text2); }
.cat-bar-bg { flex: 1; background: var(--surface3); border-radius: 99px; height: 6px; overflow: hidden; }
.cat-bar-fill { height: 100%; border-radius: 99px; transition: width 0.6s ease; }
.cat-amt { font-family: var(--mono); font-size: 0.72rem; color: var(--text3); width: 70px; text-align: right; }

/* ============================================
   FLUJO
   ============================================ */
.flujo-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px; margin-bottom: 12px;
}
.flujo-title { font-weight: 700; font-size: 0.88rem; margin-bottom: 14px; }
.flujo-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
.flujo-row:last-child { border-bottom: none; }
.flujo-label { font-size: 0.82rem; color: var(--text2); }
.flujo-val { font-family: var(--mono); font-size: 0.88rem; }
.flujo-row.highlight .flujo-label { color: var(--text); font-weight: 700; }
.flujo-row.highlight .flujo-val { font-size: 1rem; color: var(--green); font-weight: 600; }

.ahorro-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.ahorro-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px; text-align: center;
}
.ahorro-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); font-family: var(--mono); margin-bottom: 6px; }
.ahorro-val { font-family: var(--mono); font-size: 0.88rem; font-weight: 600; color: var(--green); }

/* ============================================
   INFORME
   ============================================ */
.informe-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.informe-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px; text-align: center;
}
canvas { max-width: 100%; display: block; }

/* ============================================
   MODAL (MONTH PICKER + EDIT)
   ============================================ */
.modal-overlay {
  position: fixed; inset: 0; background: var(--overlay); z-index: 500;
  display: none; align-items: flex-end; justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border-radius: var(--radius) var(--radius) 0 0;
  padding: 20px; width: 100%; max-width: 480px;
  max-height: 85vh; overflow-y: auto;
  animation: slideUp 0.25s ease;
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-title { font-weight: 700; font-size: 1rem; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
.modal-close { background: none; border: none; color: var(--text3); font-size: 1.2rem; cursor: pointer; padding: 4px; }

/* Month picker */
.year-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.year-nav button { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 14px; border-radius: var(--radius-xs); cursor: pointer; font-family: var(--font); font-size: 0.88rem; }
.year-label { font-weight: 700; font-size: 1rem; font-family: var(--mono); }
.month-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
.month-opt {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 10px 6px; text-align: center;
  font-size: 0.8rem; cursor: pointer; transition: all var(--transition); font-weight: 500;
}
.month-opt:hover { border-color: var(--orange); color: var(--orange); }
.month-opt.active { background: var(--orange); color: white; border-color: var(--orange); }

/* ============================================
   EMPTY STATE
   ============================================ */
.empty { text-align: center; padding: 32px 20px; color: var(--text3); }
.empty-icon { font-size: 2rem; margin-bottom: 8px; }
.empty-text { font-size: 0.85rem; }

/* ============================================
   TOAST
   ============================================ */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--surface); border: 1px solid var(--border2);
  color: var(--text); padding: 10px 20px; border-radius: 99px;
  font-size: 0.82rem; z-index: 1000; opacity: 0;
  transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
  box-shadow: 0 8px 24px var(--shadow);
}
.toast.show { opacity: 1; }

/* ============================================
   DIVIDER
   ============================================ */
.divider { height: 1px; background: var(--border); margin: 12px 0; }

@media(max-width:360px) {
  .informe-grid { grid-template-columns: 1fr 1fr; }
  .ahorro-grid { grid-template-columns: 1fr; gap: 6px; }
}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-logo">Nuestras<span>Finanzas</span></div>
  <div class="spinner"></div>
  <div class="loader-sub">Conectando…</div>
</div>

<!-- LOCK SCREEN -->
<div id="lockScreen" style="display:none">
  <div class="lock-logo">Nuestras<span>Finanzas</span></div>
  <div class="lock-sub">Control de Gastos Familiar · Nacho &amp; Celi</div>
  <button class="lock-btn" onclick="tryBiometric()">🔒</button>
  <div class="lock-hint" id="lockHint">Tocá para desbloquear</div>
  <div class="pin-wrap" id="pinWrap">
    <div class="pin-dots">
      <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-err" id="pinErr"></div>
    <div class="pin-grid">
      <button class="pin-key" onclick="pinPress('1')">1</button>
      <button class="pin-key" onclick="pinPress('2')">2</button>
      <button class="pin-key" onclick="pinPress('3')">3</button>
      <button class="pin-key" onclick="pinPress('4')">4</button>
      <button class="pin-key" onclick="pinPress('5')">5</button>
      <button class="pin-key" onclick="pinPress('6')">6</button>
      <button class="pin-key" onclick="pinPress('7')">7</button>
      <button class="pin-key" onclick="pinPress('8')">8</button>
      <button class="pin-key" onclick="pinPress('9')">9</button>
      <button class="pin-key" onclick="pinPress('del')">⌫</button>
      <button class="pin-key" onclick="pinPress('0')">0</button>
      <button class="pin-key ok" onclick="pinPress('ok')">OK</button>
    </div>
    <div class="pin-hint2" id="pinHint2"></div>
  </div>
</div>

<!-- APP -->
<div class="app" id="appMain" style="display:none">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="logo">Nuestras<span>Finanzas</span></div>
      <div class="logo-sub">Nacho &amp; Celi</div>
    </div>
    <div class="header-right">
      <div class="month-nav">
        <button onclick="shiftMonth(-1)">‹</button>
        <div class="month-label" onclick="openMonthPicker()" id="monthLabel">Abr 2026</div>
        <button onclick="shiftMonth(1)">›</button>

<script>
// ============================================
// SUPABASE CONFIG
// ============================================
const SB_URL = 'https://gzjhohwuyquumkgiehan.supabase.co';
const SB_KEY = 'sb_publishable_2YKu-8E5kpmXYpWs9eOjNw_C4QNFJnO';
const API = SB_URL + '/rest/v1';
const H = { 'Content-Type':'application/json', 'apikey':SB_KEY, 'Authorization':'Bearer '+SB_KEY, 'Prefer':'return=representation' };

async function dbGet(t, q='') {
  const r = await fetch(`${API}/${t}?${q}&order=created_at.asc`, {headers:H});
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function dbPost(t, body) {
  const r = await fetch(`${API}/${t}`, {method:'POST', headers:H, body:JSON.stringify(body)});
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function dbPatch(t, id, body) {
  const r = await fetch(`${API}/${t}?id=eq.${id}`, {method:'PATCH', headers:{...H,'Prefer':'return=representation'}, body:JSON.stringify(body)});
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function dbDelete(t, id) {
  const r = await fetch(`${API}/${t}?id=eq.${id}`, {method:'DELETE', headers:{...H,'Prefer':'return=minimal'}});
  if (!r.ok) throw new Error(await r.text());
}

// ============================================
// STATE
// ============================================
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MONTHS_SHORT = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const CAT_COLORS = {
  'Vivienda':'#3b82f6','Alimentación':'#22c55e','Transporte':'#eab308','Salud':'#ef4444',
  'Educación':'#06b6d4','Entretenimiento':'#f97316','Servicios':'#a855f7','Ropa':'#ec4899',
  'Mascota':'#14b8a6','Suscripciones':'#f59e0b','Otros':'#6b7280'
};

const now = new Date();
let state = {
  mes: now.getMonth()+1,
  anio: now.getFullYear(),
  ingresos: [], gastos: [], tarjetas: [],
  editingType: null, editingId: null,
  editingTarjetaId: null
};

let pickerYearVal = now.getFullYear();

function setSyncing(s) {
  const d = document.getElementById('syncDot');
  d.className = 'sync-dot' + (s==='syncing'?' syncing':s==='error'?' error':'');
}

function toast(msg, ms=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), ms);
}

// ============================================
// THEME
// ============================================
function initTheme() {
  const saved = localStorage.getItem('nf_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  document.getElementById('themeBtn').textContent = saved==='dark'?'☀️':'🌙';
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('themeBtn').textContent = next==='dark'?'☀️':'🌙';
  localStorage.setItem('nf_theme', next);
}

// ============================================
// MONTH NAVIGATION
// ============================================
function updateMonthLabel() {
  document.getElementById('monthLabel').textContent = `${MONTHS_SHORT[state.mes-1]} ${state.anio}`;
}
function shiftMonth(dir) {
  let m = state.mes + dir, y = state.anio;
  if (m > 12) { m=1; y++; }
  if (m < 1) { m=12; y--; }
  state.mes=m; state.anio=y;
  updateMonthLabel(); loadAll();
}
function openMonthPicker() {
  pickerYearVal = state.anio;
  renderPickerYear();
  document.getElementById('monthModal').classList.add('open');
}
function closeMonthPicker(e) {
  if (e.target.classList.contains('modal-overlay')) closeModal(e.target.id);
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
function pickerYear(d) { pickerYearVal += d; renderPickerYear(); }
function renderPickerYear() {
  document.getElementById('pickerYearLabel').textContent = pickerYearVal;
  const grid = document.getElementById('monthGrid');
  grid.innerHTML = MONTHS_SHORT.map((m,i)=>`
    <div class="month-opt ${state.mes===i+1&&state.anio===pickerYearVal?'active':''}"
         onclick="selectMonth(${i+1},${pickerYearVal})">${m}</div>`).join('');
}
function selectMonth(m, y) {
  state.mes=m; state.anio=y;
  updateMonthLabel(); closeModal('monthModal'); loadAll();
}

// ============================================
// LOAD DATA
// ============================================
async function loadAll() {
  setSyncing('syncing');
  try {
    const [tarjetas, ingresos, gastos] = await Promise.all([
      dbGet('tarjetas'),
      dbGet('ingresos', `mes=eq.${state.mes}&anio=eq.${state.anio}`),
      dbGet('gastos', `mes=eq.${state.mes}&anio=eq.${state.anio}`)
    ]);
    state.tarjetas=tarjetas; state.ingresos=ingresos; state.gastos=gastos;
    setSyncing('ok'); renderAll();
  } catch(e) {
    setSyncing('error'); toast('❌ Error de conexión');
  }
}

// ============================================
// FORMS
// ============================================
function toggleForm(id) {
  const el = document.getElementById(id);
  const wasOpen = el.classList.contains('open');
  el.classList.toggle('open');
  updateCardSelects();
  if (!wasOpen) {
    // Set default month/year to currently selected
    if (id==='fIngreso') {
      document.getElementById('i_mes').value = state.mes;
      document.getElementById('i_anio').value = state.anio;
    }
    if (id==='fGasto') {
      document.getElementById('g_mes').value = state.mes;
      document.getElementById('g_anio').value = state.anio;
    }
    if (id==='fTarjeta') {
      document.getElementById('t_cierre_mes').value = state.mes;
      document.getElementById('t_venc_mes').value = state.mes;
    }
  }
}
function toggleCardFields() {
  const isTarjeta = document.getElementById('g_medio').value==='tarjeta';
  document.getElementById('gTarjetaField').style.display = isTarjeta?'':'none';
  document.getElementById('gCuotasField').style.display = isTarjeta?'':'none';
}
function updateCardSelects() {
  const sel = document.getElementById('g_tarjeta');
  sel.innerHTML = state.tarjetas.length===0
    ? '<option disabled>Sin tarjetas</option>'
    : state.tarjetas.map(t=>`<option value="${t.id}">${t.nombre}</option>`).join('');
}

// INGRESO
let editingIngresoId = null;
async function saveIngreso() {
  const desc = document.getElementById('i_desc').value.trim();
  const monto = parseFloat(document.getElementById('i_monto').value);
  if (!desc||!monto) return toast('Completá descripción y monto');
  const iMes = parseInt(document.getElementById('i_mes').value)||state.mes;
  const iAnio = parseInt(document.getElementById('i_anio').value)||state.anio;
  const body = { mes:iMes, anio:iAnio, descripcion:desc, monto,
    quien:document.getElementById('i_quien').value, tipo:document.getElementById('i_tipo').value };
  setSyncing('syncing');
  try {
    if (editingIngresoId) {
      const res = await dbPatch('ingresos', editingIngresoId, body);
      state.ingresos = state.ingresos.map(i=>i.id===editingIngresoId?res[0]:i);
      editingIngresoId=null; toast('✅ Ingreso actualizado');
    } else {
      const res = await dbPost('ingresos', body);
      state.ingresos.push(res[0]); toast('✅ Ingreso guardado');
    }
    document.getElementById('i_desc').value=''; document.getElementById('i_monto').value='';
    document.getElementById('fIngreso').classList.remove('open');
    setSyncing('ok'); renderAll();
  } catch(e) { setSyncing('error'); toast('❌ Error al guardar'); }
}
function editIngreso(id) {
  const i = state.ingresos.find(x=>x.id===id); if(!i) return;
  editingIngresoId = id;
  document.getElementById('i_desc').value = i.descripcion||'';
  document.getElementById('i_monto').value = i.monto;
  document.getElementById('i_quien').value = i.quien;
  document.getElementById('i_tipo').value = i.tipo;
  document.getElementById('i_mes').value = i.mes||state.mes;
  document.getElementById('i_anio').value = i.anio||state.anio;
  document.getElementById('fIngreso').classList.add('open');
  document.getElementById('fIngreso').scrollIntoView({behavior:'smooth',block:'nearest'});
}
async function deleteIngreso(id) {
  if (!confirm('¿Eliminar este ingreso?')) return;
  setSyncing('syncing');
  try { await dbDelete('ingresos',id); state.ingresos=state.ingresos.filter(i=>i.id!==id); setSyncing('ok'); renderAll(); }
  catch(e) { setSyncing('error'); toast('❌ Error'); }
}

// GASTO
let editingGastoId = null;
function cancelGasto() {
  editingGastoId=null;
  document.getElementById('fGasto').classList.remove('open');
  document.getElementById('btnSaveGasto').textContent='Guardar';
}
async function saveGasto() {
  const desc = document.getElementById('g_desc').value.trim();
  const monto = parseFloat(document.getElementById('g_monto').value);
  if (!desc||!monto) return toast('Completá descripción y monto');
  const medio = document.getElementById('g_medio').value;
  const tarjeta_id = medio==='tarjeta'?document.getElementById('g_tarjeta').value:null;
  const cuotas = medio==='tarjeta'?parseInt(document.getElementById('g_cuotas').value):1;
  const cuotaMonto = Math.round(monto/cuotas);
  const gMes = parseInt(document.getElementById('g_mes').value)||state.mes;
  const gAnio = parseInt(document.getElementById('g_anio').value)||state.anio;
  const body = {
    mes:gMes, anio:gAnio, descripcion:desc, monto:cuotaMonto,
    cat:document.getElementById('g_cat').value, tipo:document.getElementById('g_tipo').value,
    medio, tarjeta_id, quien:document.getElementById('g_quien').value,
    dia:parseInt(document.getElementById('g_dia').value)||null,
    cuotas, cuota_actual:1, gasto_origen_id:null
  };
  setSyncing('syncing');
  try {
    if (editingGastoId) {
      // Edit: only update this specific gasto, no cuotas propagation
      const res = await dbPatch('gastos', editingGastoId, {...body, cuotas:undefined, cuota_actual:undefined, gasto_origen_id:undefined});
      state.gastos = state.gastos.map(g=>g.id===editingGastoId?res[0]:g);
      editingGastoId=null; toast('✅ Gasto actualizado');
    } else {
      // Create first cuota
      const res = await dbPost('gastos', body);
      const origen = res[0];
      state.gastos.push(origen);
      // Create remaining cuotas in future months
      if (cuotas>1) {
        const futures = [];
        for (let c=2; c<=cuotas; c++) {
          let m=gMes+c-1, y=gAnio;
          while(m>12){m-=12;y++;}
          futures.push({...body, mes:m, anio:y, cuota_actual:c, gasto_origen_id:origen.id});
        }
        // Fire and forget future cuotas
        for (const f of futures) { dbPost('gastos', f).catch(()=>{}); }
        toast(`✅ Gasto en ${cuotas} cuotas creado`);
      } else { toast('✅ Gasto guardado'); }
    }
    document.getElementById('g_desc').value=''; document.getElementById('g_monto').value='';
    document.getElementById('fGasto').classList.remove('open');
    document.getElementById('btnSaveGasto').textContent='Guardar';
    setSyncing('ok'); renderAll();
  } catch(e) { setSyncing('error'); toast('❌ Error al guardar'); console.error(e); }
}
function editGasto(id) {
  const g = state.gastos.find(x=>x.id===id); if(!g) return;
  editingGastoId=id;
  document.getElementById('g_desc').value=g.descripcion||'';
  document.getElementById('g_monto').value=g.monto;
  document.getElementById('g_mes').value=g.mes||state.mes;
  document.getElementById('g_anio').value=g.anio||state.anio;
  document.getElementById('g_cat').value=g.cat;
  document.getElementById('g_tipo').value=g.tipo;
  document.getElementById('g_medio').value=g.medio;
  document.getElementById('g_quien').value=g.quien;
  document.getElementById('g_dia').value=g.dia||'';
  toggleCardFields();

}
async function deleteGasto(id) {
  if (!confirm('¿Eliminar este gasto?')) return;
  setSyncing('syncing');
  try { await dbDelete('gastos',id); state.gastos=state.gastos.filter(g=>g.id!==id); setSyncing('ok'); renderAll(); }

}

// TARJETA
let editingTarjetaId = null;
function cancelTarjeta() {
  editingTarjetaId=null;
  document.getElementById('fTarjeta').classList.remove('open');
  document.getElementById('btnSaveTarjeta').textContent='Guardar';
}
async function saveTarjeta() {
  const nombre = document.getElementById('t_nombre').value.trim();
  if (!nombre) return toast('Ingresá el nombre');
  const body = { nombre, cierre:parseInt(document.getElementById('t_cierre').value)||null, cierre_mes:parseInt(document.getElementById('t_cierre_mes').value)||null, vencimiento:parseInt(document.getElementById('t_venc').value)||null, venc_mes:parseInt(document.getElementById('t_venc_mes').value)||null, titular:document.getElementById('t_titular').value };
  setSyncing('syncing');
  try {
    if (editingTarjetaId) {
      const res = await dbPatch('tarjetas', editingTarjetaId, body);
      state.tarjetas=state.tarjetas.map(t=>t.id===editingTarjetaId?res[0]:t);
      editingTarjetaId=null; toast('✅ Tarjeta actualizada');
    } else {
      const res = await dbPost('tarjetas', body);
      state.tarjetas.push(res[0]); toast('✅ Tarjeta guardada');
    }
    document.getElementById('t_nombre').value='';
    document.getElementById('fTarjeta').classList.remove('open');
    document.getElementById('btnSaveTarjeta').textContent='Guardar';
    setSyncing('ok'); renderAll();
  } catch(e) { setSyncing('error'); toast('❌ Error'); }
}
function editTarjeta(id) {
  const t = state.tarjetas.find(x=>x.id===id); if(!t) return;
  editingTarjetaId=id;
  document.getElementById('t_nombre').value=t.nombre;
  document.getElementById('t_cierre').value=t.cierre||'';
  document.getElementById('t_cierre_mes').value=t.cierre_mes||state.mes;
  document.getElementById('t_venc').value=t.vencimiento||'';
  document.getElementById('t_venc_mes').value=t.venc_mes||state.mes;
  document.getElementById('t_titular').value=t.titular;
  document.getElementById('btnSaveTarjeta').textContent='Actualizar';
  document.getElementById('fTarjeta').classList.add('open');
  switchTab('tarjetas');
  document.getElementById('fTarjeta').scrollIntoView({behavior:'smooth',block:'nearest'});
}
async function deleteTarjeta(id) {
  if (!confirm('¿Eliminar esta tarjeta?')) return;
  setSyncing('syncing');
  try { await dbDelete('tarjetas',id); state.tarjetas=state.tarjetas.filter(t=>t.id!==id); setSyncing('ok'); renderAll(); }

}

function getBgColor() {
  return document.documentElement.getAttribute('data-theme')==='dark'?'#1e1e2a':'#ffffff';
}
function getTextColor() {
  return document.documentElement.getAttribute('data-theme')==='dark'?'#f4f4f8':'#0a0a1a';
}
function getMutedColor() {
  return document.documentElement.getAttribute('data-theme')==='dark'?'#5a5a72':'#9090a8';
}

function drawDonut(id,labels,data,colors) {
  const canvas=document.getElementById(id); if(!canvas)return;
  const W=canvas.width=canvas.offsetWidth, H=canvas.height=120;
  const ctx=canvas.getContext('2d');
  const total=data.reduce((a,b)=>a+b,0);
  if(!total){ctx.fillStyle=getMutedColor();ctx.font='11px Outfit';ctx.textAlign='center';ctx.fillText('Sin datos',W/2,H/2);return;}
  const cx=W/2,cy=H/2,r=Math.min(cx,cy)-6,inner=r*0.58;
  let angle=-Math.PI/2;
  data.forEach((val,i)=>{
    if(!val)return;
    const slice=(val/total)*Math.PI*2;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,angle,angle+slice);ctx.closePath();
    ctx.fillStyle=colors[i];ctx.fill();angle+=slice;
  });
  ctx.beginPath();ctx.arc(cx,cy,inner,0,Math.PI*2);ctx.fillStyle=getBgColor();ctx.fill();
  ctx.fillStyle=getTextColor();ctx.font='bold 11px JetBrains Mono';ctx.textAlign='center';
  ctx.fillText(fmt(total),cx,cy+4);
}
function drawBars(id,labels,data,colors) {
  const canvas=document.getElementById(id); if(!canvas||!data.length)return;
  const W=canvas.width=canvas.offsetWidth, H=canvas.height=140;
  const ctx=canvas.getContext('2d');
  const max=Math.max(...data),pad=5,barW=Math.floor((W-pad*(labels.length+1))/labels.length),chartH=H-22;
  data.forEach((val,i)=>{
    const x=pad+i*(barW+pad),barH=max>0?Math.round((val/max)*chartH*0.88):0,y=chartH-barH;
    ctx.fillStyle=colors[i]+'77';ctx.beginPath();ctx.roundRect(x,y,barW,barH,[3,3,0,0]);ctx.fill();
    ctx.fillStyle=colors[i];ctx.beginPath();ctx.roundRect(x,y,barW,Math.min(3,barH),[3,3,0,0]);ctx.fill();
    ctx.fillStyle=getMutedColor();ctx.font='8px Outfit';ctx.textAlign='center';
    ctx.fillText((labels[i]||'').slice(0,5),x+barW/2,H-4);
  });
}
function drawBarsH(id,labels,data,colors) {
  const canvas=document.getElementById(id); if(!canvas)return;
  const W=canvas.width=canvas.offsetWidth, H=canvas.height=85;
  const ctx=canvas.getContext('2d');
  const max=Math.max(...data,1),lW=52,pad=6,rowH=Math.floor((H-pad*(labels.length+1))/labels.length);
  data.forEach((val,i)=>{
    const y=pad+i*(rowH+pad),bW=Math.round((val/max)*(W-lW-pad*2));
    ctx.fillStyle=colors[i]+'33';ctx.beginPath();ctx.roundRect(lW,y,W-lW-pad,rowH,3);ctx.fill();
    if(bW>0){ctx.fillStyle=colors[i];ctx.beginPath();ctx.roundRect(lW,y,bW,rowH,3);ctx.fill();}
    ctx.fillStyle=getTextColor();ctx.font='10px Outfit';ctx.textAlign='right';ctx.fillText(labels[i],lW-5,y+rowH/2+4);
    ctx.fillStyle=getMutedColor();ctx.font='8px JetBrains Mono';ctx.textAlign='left';ctx.fillText(fmt(val),lW+bW+5,y+rowH/2+4);
  });
}

  const wb=XLSX.utils.book_new();
  const totalInc=ingresos.reduce((a,i)=>a+parseFloat(i.monto),0);
  const totalGas=gastos.reduce((a,g)=>a+parseFloat(g.monto),0);
  const fijos=gastos.filter(g=>g.tipo==='fijo').reduce((a,g)=>a+parseFloat(g.monto),0);

  const ws1=XLSX.utils.aoa_to_sheet([['NuestrasFinanzas — '+mes],[],['RESUMEN',''],
    ['Total Ingresos',totalInc],['Total Gastos',totalGas],['Fijos',fijos],
    ['Variables',totalGas-fijos],['Saldo',totalInc-totalGas],
    ['% gastado',totalInc>0?Math.round(totalGas/totalInc*100)+'%':'—']]);
  ws1['!cols']=[{wch:28},{wch:16}];
  XLSX.utils.book_append_sheet(wb,ws1,'Resumen');

  const ws2=XLSX.utils.aoa_to_sheet([['Descripción','Monto','Quién','Tipo'],
    ...ingresos.map(i=>[i.descripcion,parseFloat(i.monto),i.quien,i.tipo]),[],['TOTAL',totalInc]]);
  XLSX.utils.book_append_sheet(wb,ws2,'Ingresos');

  const ws3=XLSX.utils.aoa_to_sheet([['Descripción','Monto','Categoría','Tipo','Medio','Quién','Día','Cuotas'],
    ...[...gastos].sort((a,b)=>(a.dia||99)-(b.dia||99)).map(g=>{
      const t=g.tarjeta_id?tarjetas.find(t=>t.id===g.tarjeta_id)?.nombre||'Tarjeta':'—';
      return [g.descripcion,parseFloat(g.monto),g.cat,g.tipo,g.medio==='tarjeta'?t:'Efectivo/Déb.',g.quien,g.dia||'',g.cuotas>1?`${g.cuota_actual}/${g.cuotas}`:''];
    }),[],['TOTAL',totalGas]]);
  XLSX.utils.book_append_sheet(wb,ws3,'Gastos');

  const catTotals={};
  gastos.forEach(g=>{catTotals[g.cat]=(catTotals[g.cat]||0)+parseFloat(g.monto);});
  const ws4=XLSX.utils.aoa_to_sheet([['Categoría','Monto','% del total'],
    ...Object.entries(catTotals).sort((a,b)=>b[1]-a[1]).map(([cat,m])=>[cat,m,totalGas>0?Math.round(m/totalGas*100)+'%':'—'])]);
  XLSX.utils.book_append_sheet(wb,ws4,'Por Categoría');

  XLSX.writeFile(wb,`NuestrasFinanzas_${MONTHS[state.mes-1]}_${state.anio}.xlsx`);
  toast('✅ Excel descargado');
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  const tabs=['gastos','tarjetas','categorias','flujo','informe'];
  document.querySelectorAll('.tab')[tabs.indexOf(name)].classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='informe') renderInforme();
}

// ============================================
// AUTH
// ============================================
function hashPin(pin){let h=0;for(let i=0;i<pin.length;i++)h=Math.imul(31,h)+pin.charCodeAt(i)|0;return h.toString(36);}
function isSession(){const s=sessionStorage.getItem('nf_sess');return s&&(Date.now()-parseInt(s))<30*60*1000;}
function unlock(){
  sessionStorage.setItem('nf_sess',Date.now().toString());
  const l=document.getElementById('lockScreen');
  l.style.transition='opacity 0.35s';l.style.opacity='0';
  setTimeout(()=>{l.style.display='none';},350);
}
async function tryBiometric(){
  if(window.PublicKeyCredential){
    try{
      const avail=await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
      if(avail){
        const stored=localStorage.getItem('nf_cid');
        if(stored){
          const credId=Uint8Array.from(atob(stored),c=>c.charCodeAt(0));
          const a=await navigator.credentials.get({publicKey:{challenge:crypto.getRandomValues(new Uint8Array(32)),allowCredentials:[{id:credId,type:'public-key'}],userVerification:'required',timeout:60000}});
          if(a){unlock();return;}
        } else {
          const r=await navigator.credentials.create({publicKey:{challenge:crypto.getRandomValues(new Uint8Array(32)),rp:{name:'NuestrasFinanzas',id:location.hostname},user:{id:new Uint8Array(16),name:'nacho-celi',displayName:'Nacho & Celi'},pubKeyCredParams:[{alg:-7,type:'public-key'},{alg:-257,type:'public-key'}],authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required'},timeout:60000}});
          if(r){localStorage.setItem('nf_cid',btoa(String.fromCharCode(...new Uint8Array(r.rawId))));unlock();return;}
        }
      }
    }catch(e){console.log('Bio failed',e.message);}
  }
  showPin();
}
function showPin(){
  document.querySelector('.lock-btn').style.display='none';
  document.getElementById('lockHint').style.display='none';
  document.getElementById('pinWrap').style.display='flex';
  document.getElementById('pinHint2').textContent=localStorage.getItem('nf_pin')?'Ingresá tu PIN':'Primera vez: creá tu PIN';
}
let pinBuf='';
function pinPress(v){
  const err=document.getElementById('pinErr');
  if(v==='del'){pinBuf=pinBuf.slice(0,-1);}
  else if(v==='ok'){
    const stored=localStorage.getItem('nf_pin');
    if(!stored){if(pinBuf.length===4){localStorage.setItem('nf_pin',hashPin(pinBuf));unlock();}else{err.textContent='El PIN debe tener 4 dígitos';}}
    else{if(hashPin(pinBuf)===stored){err.textContent='';unlock();}else{err.textContent='PIN incorrecto';pinBuf='';updatePinDots();}}
    return;
  } else if(pinBuf.length<4){pinBuf+=v;}
  updatePinDots(); err.textContent='';
  if(pinBuf.length===4&&localStorage.getItem('nf_pin'))setTimeout(()=>pinPress('ok'),200);
}
function updatePinDots(){for(let i=0;i<4;i++)document.getElementById('pd'+i).classList.toggle('filled',i<pinBuf.length);}

// ============================================
// INIT
// ============================================
async function init() {
  initTheme();
  buildManifest();
  updateMonthLabel();
  if(isSession()){
    document.getElementById('lockScreen').style.display='none';
  } else {
    document.getElementById('lockScreen').style.display='flex';
    setTimeout(tryBiometric, 500);
  }
  try {
    await loadAll();
    document.getElementById('loader').style.display='none';
    document.getElementById('appMain').style.display='block';
  } catch(e) {
    document.querySelector('.loader-sub').textContent='❌ Error de conexión';
  }
}

function buildManifest(){
  const m={name:'NuestrasFinanzas',short_name:'NuestrasFinanzas',start_url:'.',display:'standalone',background_color:'#0a0a0f',theme_color:'#0a0a0f',orientation:'portrait'};
  const b=new Blob([JSON.stringify(m)],{type:'application/json'});
  document.getElementById('pwa-manifest').href=URL.createObjectURL(b);
}

init();
</script>
