<style>
/* =============================================
   BRAND TOKENS
   ============================================= */
:root {
  --teal:        #00b4a6;
  --teal-light:  #2dd4c8;
  --teal-soft:   rgba(0,180,166,0.12);
  --navy:        #1a2b5e;
  --navy-light:  #2a3f80;
  --purple:      #5a46be;
  --purple-soft: rgba(90,70,190,0.12);
  --sun:         #f5c842;
  --sun-soft:    rgba(245,200,66,0.15);
  --green:       #10b981;
  --green-soft:  rgba(16,185,129,0.12);
  --red:         #ef4444;
  --red-soft:    rgba(239,68,68,0.12);
  --lavender:    #7b8fd4;

  --font-display: 'Space Grotesk', sans-serif;
  --font-body:    'Nunito', sans-serif;
  --font-mono:    'Space Grotesk', monospace;

  --r:   16px;
  --r-sm: 10px;
  --r-xs: 7px;
  --ease: cubic-bezier(0.4,0,0.2,1);
}

[data-theme="dark"] {
  --bg:       #0b0f1e;
  --bg2:      #0f1628;
  --surf:     #141d35;
  --surf2:    #1a2540;
  --surf3:    #1f2d4a;
  --border:   rgba(0,180,166,0.12);
  --border2:  rgba(0,180,166,0.25);
  --text:     #e8eeff;
  --text2:    #7a90c0;
  --text3:    #3d527a;
  --shadow:   rgba(0,0,0,0.6);
  --overlay:  rgba(5,8,20,0.85);
}
[data-theme="light"] {
  --bg:       #f0f5ff;
  --bg2:      #e4ecff;
  --surf:     #ffffff;
  --surf2:    #f0f6ff;
  --surf3:    #e4eeff;
  --border:   rgba(26,43,94,0.09);
  --border2:  rgba(26,43,94,0.18);
  --text:     #0b0f1e;
  --text2:    #3a4e7a;
  --text3:    #8899cc;
  --shadow:   rgba(26,43,94,0.1);
  --overlay:  rgba(0,0,0,0.45);
}

* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  overflow-x: hidden;
  overflow-y: auto;
  transition: background 0.3s, color 0.3s;
}

/* =============================================
   LOADER
   ============================================= */
#loader {
  position:fixed; inset:0; background:var(--bg); z-index:9999;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;
}
.ld-mark { animation: float 2s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
.ld-wordmark {
  font-family: var(--font-display); font-weight:700; font-size:1.5rem;
  letter-spacing:-0.5px; line-height:1;
}
.ld-wordmark .w1 { color:var(--text); }
.ld-wordmark .w2 { color:var(--teal); font-weight:300; }
.ld-sub { font-size:0.72rem; color:var(--text3); letter-spacing:2px; text-transform:uppercase; }
.spinner {
  width:24px; height:24px; border:2.5px solid var(--border2);
  border-top-color:var(--teal); border-radius:50%;
  animation:spin 0.7s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg)} }

/* =============================================
   LOCK SCREEN
   ============================================= */
#lockScreen {
  position:fixed; inset:0; background:var(--bg); z-index:9998;
  display:none; flex-direction:column; align-items:center; justify-content:center;
  gap:16px; padding:40px 24px;
}
.lock-mark { margin-bottom:4px; animation:float 2.5s ease-in-out infinite; }
.lock-wordmark {
  font-family:var(--font-display); font-size:1.8rem; font-weight:700;
  letter-spacing:-1px; line-height:1.1; text-align:center;
}
.lock-wordmark .w2 { color:var(--teal); font-weight:300; display:block; }
.lock-tagline {
  font-size:0.68rem; color:var(--text3); letter-spacing:2px;
  text-transform:uppercase; text-align:center; margin-top:-4px;
}
.lock-orb {
  width:72px; height:72px; border-radius:50%;
  background:linear-gradient(135deg, var(--teal), var(--navy));
  display:flex; align-items:center; justify-content:center;
  font-size:1.8rem; border:none; cursor:pointer;
  box-shadow:0 0 0 0 rgba(0,180,166,0.4);
  animation:orbPulse 2.5s infinite; transition:transform 0.15s;
}
.lock-orb:active { transform:scale(0.92); }
@keyframes orbPulse { 0%,100%{box-shadow:0 0 0 0 rgba(0,180,166,0.35)} 60%{box-shadow:0 0 0 20px rgba(0,180,166,0)} }
.lock-msg { font-size:0.8rem; color:var(--text3); }

.pin-wrap { display:none; flex-direction:column; align-items:center; gap:14px; width:100%; max-width:255px; }
.pin-dots { display:flex; gap:10px; }
.pin-dot { width:11px; height:11px; border-radius:50%; border:2px solid var(--border2); background:transparent; transition:all 0.2s; }
.pin-dot.filled { background:var(--teal); border-color:var(--teal); }
.pin-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; width:100%; }
.pin-key {
  background:var(--surf2); border:1px solid var(--border);
  color:var(--text); border-radius:var(--r-sm); padding:14px;
  font-family:var(--font-display); font-size:1.1rem; font-weight:600;
  cursor:pointer; transition:all 0.15s; text-align:center;
}
.pin-key:active { background:var(--teal); color:white; transform:scale(0.94); }
.pin-key.ok { background:var(--teal); color:white; }
.pin-err { font-size:0.75rem; color:var(--red); min-height:16px; }
.pin-hint2 { font-size:0.7rem; color:var(--text3); text-align:center; }

/* =============================================
   APP
   ============================================= */
.app { max-width:480px; margin:0 auto; padding-bottom:100px; overflow-x:hidden; width:100%; }

/* =============================================
   HEADER
   ============================================= */
.hdr {
  position:sticky; top:0; z-index:100;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  padding:10px 12px;
  display:flex; align-items:center; justify-content:space-between; gap:6px;
  width:100%; min-height:60px;
}
.hdr-brand { display:flex; align-items:center; gap:8px; flex:1; min-width:0; }
.hdr-mark { flex-shrink:0; }
.hdr-text { }
.hdr-name {
  font-family:var(--font-display); font-weight:700; font-size:0.9rem;
  letter-spacing:-0.3px; line-height:1; white-space:nowrap;
}
.hdr-name .w2 { color:var(--teal); font-weight:300; }
.hdr-sub { font-size:0.6rem; color:var(--text3); letter-spacing:1.5px; text-transform:uppercase; margin-top:2px; }
.hdr-right { display:flex; align-items:center; gap:5px; flex-shrink:0; }

.month-nav { display:flex; align-items:center; gap:4px; }
.mnav-btn {
  background:var(--surf2); border:1px solid var(--border); color:var(--text);
  width:28px; height:28px; border-radius:var(--r-xs);
  font-size:0.9rem; cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:all 0.2s; font-family:var(--font-display);
}
.mnav-btn:hover { background:var(--surf3); border-color:var(--border2); }
.month-pill {
  font-family:var(--font-mono); font-size:0.7rem; font-weight:500;
  color:var(--teal); background:var(--teal-soft); border:1px solid rgba(0,180,166,0.2);
  padding:5px 10px; border-radius:99px; white-space:nowrap;
  cursor:pointer; min-width:74px; text-align:center; letter-spacing:0.3px;
  transition:all 0.2s;
}
.month-pill:hover { background:rgba(0,180,166,0.2); }
.theme-btn {
  background:var(--surf2); border:1px solid var(--border); color:var(--text);
  width:32px; height:32px; border-radius:var(--r-xs);
  font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:all 0.2s; flex-shrink:0;
}
.sync { width:7px; height:7px; border-radius:50%; background:var(--green); transition:background 0.3s; }
.sync.syncing { background:var(--sun); animation:pulse 1s infinite; }
.sync.error { background:var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* =============================================
   SUMMARY
   ============================================= */
.summary {
  display:grid; grid-template-columns:1fr 1fr; gap:10px;
  padding:14px 16px;
}
.scard {
  background:var(--surf); border:1px solid var(--border);
  border-radius:var(--r); padding:16px;
  transition:border-color 0.2s, transform 0.2s;
  position:relative; overflow:hidden;
}
.scard::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg, transparent 60%, rgba(0,180,166,0.04));
  pointer-events:none;
}
.scard:hover { border-color:var(--border2); transform:translateY(-1px); }
.sc-label {
  font-size:0.6rem; text-transform:uppercase; letter-spacing:2px;
  color:var(--text3); font-family:var(--font-display); font-weight:500;
  margin-bottom:8px;
}
.sc-value {
  font-family:var(--font-display); font-size:1.35rem; font-weight:700;
  line-height:1; letter-spacing:-0.5px;
}
.sc-value.teal  { color:var(--teal); }
.sc-value.red   { color:var(--red); }
.sc-value.navy  { color:var(--lavender); }
.sc-value.sun   { color:var(--sun); }
.sc-sub { font-size:0.68rem; color:var(--text3); margin-top:5px; font-family:var(--font-body); }
.sc-bar { background:var(--surf3); border-radius:99px; height:3px; margin-top:10px; overflow:hidden; }
.sc-fill { height:100%; border-radius:99px; transition:width 0.6s var(--ease); }

/* =============================================
   INCOME SECTION
   ============================================= */
.section { padding:0 16px; width:100%; }
.sec-head {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 0 10px;
}
.sec-title {
  font-family:var(--font-display); font-weight:700; font-size:0.88rem;
  letter-spacing:-0.2px; color:var(--text);
}
.btn-add {
  background:var(--teal); color:white; border:none;
  padding:7px 14px; border-radius:99px;
  font-family:var(--font-display); font-size:0.75rem; font-weight:600;
  cursor:pointer; transition:all 0.2s; white-space:nowrap; letter-spacing:0.3px;
}
.btn-add:hover { background:var(--teal-light); transform:translateY(-1px); }
.btn-add.green { background:var(--green); }

/* =============================================
   FORM PANEL
   ============================================= */
.form-panel {
  background:var(--surf); border:1px solid var(--border);
  border-top:2px solid var(--teal);
  border-radius:var(--r); padding:18px;
  margin-bottom:12px; display:none;
  animation:fadeDown 0.2s var(--ease);
}
.form-panel.open { display:block; }
@keyframes fadeDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }

.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.field { display:flex; flex-direction:column; gap:5px; }
.field label {
  font-size:0.62rem; text-transform:uppercase; letter-spacing:1.5px;
  color:var(--text3); font-family:var(--font-display); font-weight:500;
}
.field input, .field select {
  background:var(--surf2); border:1px solid var(--border);
  color:var(--text); padding:9px 12px; border-radius:var(--r-sm);
  font-family:var(--font-display); font-size:0.9rem; font-weight:500;
  transition:border-color 0.2s; width:100%;
}
.field input::placeholder { color:var(--text3); font-weight:400; }
.field input:focus, .field select:focus {
  outline:none; border-color:var(--teal);
  box-shadow:0 0 0 3px rgba(0,180,166,0.1);
}
.form-actions { display:flex; gap:8px; margin-top:14px; justify-content:flex-end; }
.btn-save {
  background:var(--teal); color:white; border:none;
  padding:9px 22px; border-radius:99px;
  font-family:var(--font-display); font-size:0.85rem; font-weight:700;
  cursor:pointer; letter-spacing:0.3px; transition:all 0.2s;
}
.btn-save:hover { background:var(--teal-light); }
.btn-cancel {
  background:transparent; color:var(--text3); border:1px solid var(--border);
  padding:9px 16px; border-radius:99px;
  font-family:var(--font-display); font-size:0.85rem; cursor:pointer;
  transition:all 0.2s;
}

/* =============================================
   ITEM LIST
   ============================================= */
.item-list { display:flex; flex-direction:column; gap:6px; margin-bottom:4px; }
.item {
  background:var(--surf); border:1px solid var(--border);
  border-radius:var(--r); padding:13px 14px;
  display:flex; align-items:center; gap:10px;
  transition:all 0.2s; cursor:default;
}
.item:hover { border-color:var(--border2); transform:translateX(2px); }
.item-accent { width:3px; height:36px; border-radius:99px; flex-shrink:0; }
.item-info { flex:1; min-width:0; }
.item-name {
  font-family:var(--font-display); font-weight:600; font-size:0.88rem;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  letter-spacing:-0.2px;
}
.item-meta { display:flex; gap:5px; margin-top:4px; flex-wrap:wrap; align-items:center; }

.chip {
  display:inline-flex; align-items:center; padding:2px 8px;
  border-radius:99px; font-size:0.6rem; font-weight:700;
  font-family:var(--font-display); letter-spacing:0.8px; text-transform:uppercase;
}
.chip-fijo    { background:rgba(26,43,94,0.2);   color:var(--lavender); }
.chip-var     { background:var(--purple-soft);    color:var(--purple); }
.chip-cash    { background:var(--green-soft);     color:var(--green); }
.chip-card    { background:var(--teal-soft);      color:var(--teal); }
.chip-cuota   { background:var(--sun-soft);       color:var(--sun); }

.item-amount {
  font-family:var(--font-display); font-size:0.95rem; font-weight:700;
  white-space:nowrap; flex-shrink:0; letter-spacing:-0.3px;
}
.item-actions { display:flex; gap:3px; flex-shrink:0; }
.ibtn {
  background:none; border:none; color:var(--text3);
  cursor:pointer; padding:5px; border-radius:var(--r-xs);
  font-size:0.82rem; transition:all 0.18s; line-height:1;
}
.ibtn:hover.edit { color:var(--teal); background:var(--teal-soft); }
.ibtn:hover.del  { color:var(--red);  background:var(--red-soft); }

.group-label {
  font-size:0.6rem; text-transform:uppercase; letter-spacing:2px;
  color:var(--text3); font-family:var(--font-display); font-weight:600;
  padding:8px 0 5px; border-bottom:1px solid var(--border); margin-bottom:5px;
}

/* =============================================
   TABS
   ============================================= */
.tabs-wrap {
  position:sticky; top:60px; z-index:90;
  background:var(--bg); border-bottom:1px solid var(--border);
  padding:0; overflow-x:auto; scrollbar-width:none;
  display:flex; gap:0; width:100%;
}
.tabs-wrap::-webkit-scrollbar { display:none; }
.tab {
  flex:1 1 0; padding:11px 8px;
  font-family:var(--font-display); font-size:0.72rem; font-weight:600;
  color:var(--text3); border:none; background:none; cursor:pointer;
  border-bottom:2.5px solid transparent; transition:all 0.2s;
  white-space:nowrap; letter-spacing:0.1px; text-align:center;
}
.tab.active { color:var(--teal); border-bottom-color:var(--teal); }
.tab-content { display:none; }
.tab-content.active { display:block; }

/* =============================================
   TARJETAS
   ============================================= */
.tcard {
  background:var(--surf); border:1px solid var(--border);
  border-radius:var(--r); padding:16px; margin-bottom:10px;
  transition:border-color 0.2s;
}
.tcard:hover { border-color:var(--border2); }
.tcard-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
.tcard-name {
  font-family:var(--font-display); font-weight:700; font-size:0.92rem;
  letter-spacing:-0.3px;
}
.tcard-meta { font-size:0.7rem; color:var(--text3); margin-top:3px; }
.tcard-total {
  font-family:var(--font-display); color:var(--teal);
  font-size:1.05rem; font-weight:700; letter-spacing:-0.3px;
}
.tcard-item {
  display:flex; justify-content:space-between; align-items:center;
  font-size:0.82rem; padding:6px 0; border-bottom:1px solid var(--border);
  font-family:var(--font-body);
}
.tcard-item:last-child { border-bottom:none; }
.tcard-item-amount { font-family:var(--font-display); font-weight:600; font-size:0.82rem; }

/* =============================================
   CAT BARS
   ============================================= */
.cat-list { display:flex; flex-direction:column; gap:11px; }
.cat-row { display:flex; align-items:center; gap:10px; }
.cat-name {
  font-size:0.78rem; width:100px; flex-shrink:0; color:var(--text2);
  font-family:var(--font-display); font-weight:500;
}
.cat-bg { flex:1; background:var(--surf3); border-radius:99px; height:6px; overflow:hidden; }
.cat-fill { height:100%; border-radius:99px; transition:width 0.6s var(--ease); }
.cat-amt {
  font-family:var(--font-display); font-size:0.72rem; font-weight:600;
  color:var(--text3); width:72px; text-align:right;
}

/* =============================================
   FLUJO
   ============================================= */
.fcard {
  background:var(--surf); border:1px solid var(--border);
  border-radius:var(--r); padding:20px; margin-bottom:12px;
}
.fcard-title {
  font-family:var(--font-display); font-weight:800; font-size:0.9rem;
  letter-spacing:-0.3px; margin-bottom:14px;
  display:flex; align-items:center; gap:8px;
}
.frow {
  display:flex; justify-content:space-between; align-items:center;
  padding:8px 0; border-bottom:1px solid var(--border);
}
.frow:last-child { border-bottom:none; }
.frow-label { font-size:0.82rem; color:var(--text2); font-family:var(--font-body); }
.frow-val {
  font-family:var(--font-display); font-size:0.9rem; font-weight:700;
  letter-spacing:-0.3px;
}
.frow.hl .frow-label { color:var(--text); font-weight:700; font-family:var(--font-display); }
.frow.hl .frow-val { font-size:1.1rem; }

.meta-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.meta-c {
  background:var(--surf); border:1px solid var(--border);
  border-radius:var(--r-sm); padding:14px; text-align:center;
  transition:border-color 0.2s;
}
.meta-c:hover { border-color:var(--border2); }
.meta-label {
  font-size:0.58rem; text-transform:uppercase; letter-spacing:1.8px;
  color:var(--text3); font-family:var(--font-display); font-weight:600; margin-bottom:6px;
}
.meta-val {
  font-family:var(--font-display); font-size:0.9rem; font-weight:800;
  color:var(--green); letter-spacing:-0.3px;
}

/* =============================================
   INFORME
   ============================================= */
.inf-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px; }
.inf-c {
  background:var(--surf); border:1px solid var(--border);
  border-radius:var(--r-sm); padding:14px; text-align:center;
}
canvas { max-width:100%; display:block; }
.chart-card {
  background:var(--surf); border:1px solid var(--border);
  border-radius:var(--r); padding:16px; margin-bottom:10px;
}
.chart-title {
  font-family:var(--font-display); font-weight:700; font-size:0.8rem;
  letter-spacing:-0.2px; margin-bottom:12px; color:var(--text2);
}
.legend-item {
  display:flex; justify-content:space-between; align-items:center;
  padding:3px 0; font-size:0.72rem;
}
.legend-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:5px; }

/* =============================================
   MODALS
   ============================================= */
.modal-overlay {
  position:fixed; inset:0; background:var(--overlay); z-index:500;
  display:none; align-items:flex-end; justify-content:center;
  backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
}
.modal-overlay.open { display:flex; }
.modal {
  background:var(--surf); border-radius:var(--r) var(--r) 0 0;
  padding:20px; width:100%; max-width:480px;
  max-height:85vh; overflow-y:auto;
  border-top:2px solid var(--teal);
  animation:slideUp 0.25s var(--ease);
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-head {
  font-family:var(--font-display); font-weight:800; font-size:1rem;
  letter-spacing:-0.3px; margin-bottom:18px;
  display:flex; justify-content:space-between; align-items:center;
}
.modal-close {
  background:var(--surf2); border:1px solid var(--border);
  color:var(--text3); width:28px; height:28px; border-radius:50%;
  font-size:0.8rem; cursor:pointer; display:flex; align-items:center; justify-content:center;
}

.year-nav {
  display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;
}
.year-nav button {
  background:var(--surf2); border:1px solid var(--border); color:var(--text);
  padding:7px 16px; border-radius:99px; cursor:pointer;
  font-family:var(--font-display); font-size:0.82rem; font-weight:600;
  transition:all 0.2s;
}
.year-nav button:hover { background:var(--surf3); }
.year-lbl {
  font-family:var(--font-display); font-weight:800; font-size:1.1rem;
  letter-spacing:-0.5px; color:var(--teal);
}
.month-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
.month-opt {
  background:var(--surf2); border:1px solid var(--border);
  border-radius:var(--r-sm); padding:10px 6px; text-align:center;
  font-family:var(--font-display); font-size:0.8rem; font-weight:600;
  cursor:pointer; transition:all 0.18s;
}
.month-opt:hover { border-color:var(--teal); color:var(--teal); }
.month-opt.active { background:var(--teal); color:white; border-color:var(--teal); }

/* =============================================
   EMPTY
   ============================================= */
.empty {
  text-align:center; padding:32px 20px;
  color:var(--text3); font-family:var(--font-body);
}
.empty-icon { font-size:2rem; margin-bottom:8px; }
.empty-text { font-size:0.85rem; }

/* =============================================
   TOAST
   ============================================= */
.toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  background:var(--surf); border:1px solid var(--border2);
  color:var(--text); padding:10px 22px; border-radius:99px;
  font-family:var(--font-display); font-size:0.82rem; font-weight:600;
  z-index:1000; opacity:0; transition:opacity 0.3s;
  pointer-events:none; white-space:nowrap;
  box-shadow:0 8px 32px var(--shadow);
  letter-spacing:0.2px;
}
.toast.show { opacity:1; }

@media(max-width:360px) {
  .inf-grid { grid-template-columns:1fr 1fr; }
  .meta-grid { grid-template-columns:1fr; gap:6px; }
}
</style>

<script>

// ============================================
// SUPABASE CONFIG
// ============================================
const SB_URL = 'https://gzjhohwuyquumkgiehan.supabase.co';
const SB_KEY = 'sb_publishable_2YKu-8E5kpmXYpWs9eOjNw_C4QNFJnO';
const API = SB_URL + '/rest/v1';
const H = { 'Content-Type':'application/json', 'apikey':SB_KEY, 'Authorization':'Bearer '+SB_KEY, 'Prefer':'return=representation' };

async function dbGet(t, q='') {
  const r = await fetch(`${API}/${t}?${q}&order=created_at.asc`, {headers:H});
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function dbPost(t, body) {
  const r = await fetch(`${API}/${t}`, {method:'POST', headers:H, body:JSON.stringify(body)});
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function dbPatch(t, id, body) {
  const r = await fetch(`${API}/${t}?id=eq.${id}`, {method:'PATCH', headers:{...H,'Prefer':'return=representation'}, body:JSON.stringify(body)});
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function dbDelete(t, id) {
  const r = await fetch(`${API}/${t}?id=eq.${id}`, {method:'DELETE', headers:{...H,'Prefer':'return=minimal'}});
  if (!r.ok) throw new Error(await r.text());
}

// ============================================
// STATE
// ============================================
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MONTHS_SHORT = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const CAT_COLORS = {
  'Vivienda':'#1a2b5e','Alimentación':'#00b4a6','Transporte':'#f5c842','Salud':'#ef4444',
  'Educación':'#7b8fd4','Entretenimiento':'#f97316','Servicios':'#a78bfa','Ropa':'#ec4899',
  'Mascota':'#2dd4bf','Suscripciones':'#f59e0b','Otros':'#6b7280'
};

const now = new Date();
let state = {
  mes: now.getMonth()+1,
  anio: now.getFullYear(),
  ingresos: [], gastos: [], tarjetas: [],
  editingType: null, editingId: null,
  editingTarjetaId: null
};

let pickerYearVal = now.getFullYear();

function setSyncing(s) {
  const d = document.getElementById('syncDot');
  d.className = 'sync-dot' + (s==='syncing'?' syncing':s==='error'?' error':'');
}

function toast(msg, ms=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), ms);
}

// ============================================
// THEME
// ============================================
function initTheme() {
  const saved = localStorage.getItem('nf_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  document.getElementById('themeBtn').textContent = saved==='dark'?'☀️':'🌙';
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('themeBtn').textContent = next==='dark'?'☀️':'🌙';
  localStorage.setItem('nf_theme', next);
}

// ============================================
// MONTH NAVIGATION
// ============================================
function updateMonthLabel() {
  document.getElementById('monthLabel').textContent = `${MONTHS_SHORT[state.mes-1]} ${state.anio}`;
}
function shiftMonth(dir) {
  let m = state.mes + dir, y = state.anio;
  if (m > 12) { m=1; y++; }
  if (m < 1) { m=12; y--; }
  state.mes=m; state.anio=y;
  updateMonthLabel(); loadAll();
}
function openMonthPicker() {
  pickerYearVal = state.anio;
  renderPickerYear();
  document.getElementById('monthModal').classList.add('open');
}
function closeMonthPicker(e) {
  if (e.target.classList.contains('modal-overlay')) closeModal(e.target.id);
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
function pickerYear(d) { pickerYearVal += d; renderPickerYear(); }
function renderPickerYear() {
  document.getElementById('pickerYearLabel').textContent = pickerYearVal;
  const grid = document.getElementById('monthGrid');
  grid.innerHTML = MONTHS_SHORT.map((m,i)=>`
    <div class="month-opt ${state.mes===i+1&&state.anio===pickerYearVal?'active':''}"
         onclick="selectMonth(${i+1},${pickerYearVal})">${m}</div>`).join('');
}
function selectMonth(m, y) {
  state.mes=m; state.anio=y;
  updateMonthLabel(); closeModal('monthModal'); loadAll();
}

// ============================================
// LOAD DATA
// ============================================
async function loadAll() {
  setSyncing('syncing');
  try {
    const [tarjetas, ingresos, gastos] = await Promise.all([
      dbGet('tarjetas'),
      dbGet('ingresos', `mes=eq.${state.mes}&anio=eq.${state.anio}`),
      dbGet('gastos', `mes=eq.${state.mes}&anio=eq.${state.anio}`)
    ]);
    state.tarjetas=tarjetas; state.ingresos=ingresos; state.gastos=gastos;
    setSyncing('ok'); renderAll();
  } catch(e) {
    setSyncing('error'); toast('❌ Error de conexión');
  }
}

// ============================================
// FORMS
// ============================================
function toggleForm(id) {
  const el = document.getElementById(id);
  const wasOpen = el.classList.contains('open');
  el.classList.toggle('open');
  updateCardSelects();
  if (!wasOpen) {
    // Set default month/year to currently selected
    if (id==='fIngreso') {
      document.getElementById('i_mes').value = state.mes;
      document.getElementById('i_anio').value = state.anio;
    }
    if (id==='fGasto') {
      document.getElementById('g_mes').value = state.mes;
      document.getElementById('g_anio').value = state.anio;
    }
    if (id==='fTarjeta') {
      document.getElementById('t_cierre_mes').value = state.mes;
      document.getElementById('t_venc_mes').value = state.mes;
    }
  }
}
function toggleCardFields() {
  const isTarjeta = document.getElementById('g_medio').value==='tarjeta';
  document.getElementById('gTarjetaField').style.display = isTarjeta?'':'none';
  document.getElementById('gCuotasField').style.display = isTarjeta?'':'none';
}
function updateCardSelects() {
  const sel = document.getElementById('g_tarjeta');
  sel.innerHTML = state.tarjetas.length===0
    ? '<option disabled>Sin tarjetas</option>'
    : state.tarjetas.map(t=>`<option value="${t.id}">${t.nombre}</option>`).join('');
}

// INGRESO
let editingIngresoId = null;
async function saveIngreso() {
  const desc = document.getElementById('i_desc').value.trim();
  const monto = parseFloat(document.getElementById('i_monto').value);
  if (!desc||!monto) return toast('Completá descripción y monto');
  const iMes = parseInt(document.getElementById('i_mes').value)||state.mes;
  const iAnio = parseInt(document.getElementById('i_anio').value)||state.anio;
  const body = { mes:iMes, anio:iAnio, descripcion:desc, monto,
    quien:document.getElementById('i_quien').value, tipo:document.getElementById('i_tipo').value };
  setSyncing('syncing');
  try {
    if (editingIngresoId) {
      const res = await dbPatch('ingresos', editingIngresoId, body);
      state.ingresos = state.ingresos.map(i=>i.id===editingIngresoId?res[0]:i);
      editingIngresoId=null; toast('✅ Ingreso actualizado');
    } else {
      const res = await dbPost('ingresos', body);
      state.ingresos.push(res[0]); toast('✅ Ingreso guardado');
    }
    document.getElementById('i_desc').value=''; document.getElementById('i_monto').value='';
    document.getElementById('fIngreso').classList.remove('open');
    setSyncing('ok'); renderAll();
  } catch(e) { setSyncing('error'); toast('❌ Error al guardar'); }
}
function editIngreso(id) {
  const i = state.ingresos.find(x=>x.id===id); if(!i) return;
  editingIngresoId = id;
  document.getElementById('i_desc').value = i.descripcion||'';
  document.getElementById('i_monto').value = i.monto;
  document.getElementById('i_quien').value = i.quien;
  document.getElementById('i_tipo').value = i.tipo;
  document.getElementById('i_mes').value = i.mes||state.mes;
  document.getElementById('i_anio').value = i.anio||state.anio;
  document.getElementById('fIngreso').classList.add('open');
  document.getElementById('fIngreso').scrollIntoView({behavior:'smooth',block:'nearest'});
}
async function deleteIngreso(id) {
  if (!confirm('¿Eliminar este ingreso?')) return;
  setSyncing('syncing');
  try { await dbDelete('ingresos',id); state.ingresos=state.ingresos.filter(i=>i.id!==id); setSyncing('ok'); renderAll(); }
  catch(e) { setSyncing('error'); toast('❌ Error'); }
}

// GASTO
let editingGastoId = null;
function cancelGasto() {
  editingGastoId=null;
  document.getElementById('fGasto').classList.remove('open');
  document.getElementById('btnSaveGasto').textContent='Guardar';
}
async function saveGasto() {
  const desc = document.getElementById('g_desc').value.trim();
  const monto = parseFloat(document.getElementById('g_monto').value);
  if (!desc||!monto) return toast('Completá descripción y monto');
  const medio = document.getElementById('g_medio').value;
  const tarjeta_id = medio==='tarjeta'?document.getElementById('g_tarjeta').value:null;
  const cuotas = medio==='tarjeta'?parseInt(document.getElementById('g_cuotas').value):1;
  const cuotaMonto = Math.round(monto/cuotas);
  const gMes = parseInt(document.getElementById('g_mes').value)||state.mes;
  const gAnio = parseInt(document.getElementById('g_anio').value)||state.anio;
  const body = {
    mes:gMes, anio:gAnio, descripcion:desc, monto:cuotaMonto,
    cat:document.getElementById('g_cat').value, tipo:document.getElementById('g_tipo').value,
    medio, tarjeta_id, quien:document.getElementById('g_quien').value,
    dia:parseInt(document.getElementById('g_dia').value)||null,
    cuotas, cuota_actual:1, gasto_origen_id:null
  };
  setSyncing('syncing');
  try {
    if (editingGastoId) {
      // Edit: only update this specific gasto, no cuotas propagation
      const editBody = {
        descripcion: descripcion, monto: parseFloat(document.getElementById('g_monto').value)||0,
        cat: document.getElementById('g_cat').value,
        tipo: document.getElementById('g_tipo').value,
        medio: medio,
        tarjeta_id: tarjeta_id,
        quien: document.getElementById('g_quien').value,
        dia: parseInt(document.getElementById('g_dia').value)||null,
        mes: gMes, anio: gAnio
      };
      const res = await dbPatch('gastos', editingGastoId, editBody);
      state.gastos = state.gastos.map(g=>g.id===editingGastoId?res[0]:g);
      editingGastoId=null; toast('✅ Gasto actualizado');
    } else {
      // Create first cuota
      const res = await dbPost('gastos', body);
      const origen = res[0];
      state.gastos.push(origen);
      // Create remaining cuotas in future months
      if (cuotas>1) {
        const futures = [];
        for (let c=2; c<=cuotas; c++) {
          let m=gMes+c-1, y=gAnio;
          while(m>12){m-=12;y++;}
          futures.push({...body, mes:m, anio:y, cuota_actual:c, gasto_origen_id:origen.id});
        }
        // Fire and forget future cuotas
        for (const f of futures) { dbPost('gastos', f).catch(()=>{}); }
        toast(`✅ Gasto en ${cuotas} cuotas creado`);
      } else { toast('✅ Gasto guardado'); }
    }
    document.getElementById('g_desc').value=''; document.getElementById('g_monto').value='';
    document.getElementById('fGasto').classList.remove('open');
    document.getElementById('btnSaveGasto').textContent='Guardar';
    setSyncing('ok'); renderAll();
  } catch(e) { setSyncing('error'); toast('❌ Error al guardar'); console.error(e); }
}
function editGasto(id) {
  const g = state.gastos.find(x=>x.id===id); if(!g) return;
  editingGastoId=id;
  // First populate card select, then set values
  updateCardSelects();
  document.getElementById('g_desc').value=g.descripcion||'';
  document.getElementById('g_monto').value=g.monto;
  document.getElementById('g_mes').value=g.mes||state.mes;
  document.getElementById('g_anio').value=g.anio||state.anio;
  document.getElementById('g_cat').value=g.cat||'Otros';
  document.getElementById('g_tipo').value=g.tipo||'variable';
  document.getElementById('g_medio').value=g.medio||'efectivo';
  document.getElementById('g_quien').value=g.quien||'Ambos';
  document.getElementById('g_dia').value=g.dia||'';
  toggleCardFields();
  // Set tarjeta after populating select
  if (g.tarjeta_id && g.medio==='tarjeta') {
    setTimeout(()=>{ 
      const sel = document.getElementById('g_tarjeta');
      if(sel) sel.value=g.tarjeta_id; 
    }, 50);

  document.getElementById('fGasto').classList.add('open');
  document.getElementById('fGasto').scrollIntoView({behavior:'smooth',block:'nearest'});
}
async function deleteGasto(id) {
  if (!confirm('¿Eliminar este gasto?')) return;
  setSyncing('syncing');
  try { await dbDelete('gastos',id); state.gastos=state.gastos.filter(g=>g.id!==id); setSyncing('ok'); renderAll(); }
  catch(e) { setSyncing('error'); toast('❌ Error'); }
}

}
async function saveTarjeta() {
  const nombre = document.getElementById('t_nombre').value.trim();
  if (!nombre) return toast('Ingresá el nombre');
  const body = { nombre, cierre:parseInt(document.getElementById('t_cierre').value)||null, cierre_mes:parseInt(document.getElementById('t_cierre_mes').value)||null, vencimiento:parseInt(document.getElementById('t_venc').value)||null, venc_mes:parseInt(document.getElementById('t_venc_mes').value)||null, titular:document.getElementById('t_titular').value };
  setSyncing('syncing');
  try {
    if (editingTarjetaId) {
      const res = await dbPatch('tarjetas', editingTarjetaId, body);
      state.tarjetas=state.tarjetas.map(t=>t.id===editingTarjetaId?res[0]:t);
      editingTarjetaId=null; toast('✅ Tarjeta actualizada');
    } else {
      const res = await dbPost('tarjetas', body);
      state.tarjetas.push(res[0]); toast('✅ Tarjeta guardada');
    }
    document.getElementById('t_nombre').value='';
    document.getElementById('fTarjeta').classList.remove('open');
    document.getElementById('btnSaveTarjeta').textContent='Guardar';
    setSyncing('ok'); renderAll();

}

function getBgColor() {
  return document.documentElement.getAttribute('data-theme')==='dark'?'#1e1e2a':'#ffffff';
}
function getTextColor() {
  return document.documentElement.getAttribute('data-theme')==='dark'?'#f4f4f8':'#0a0a1a';
}
function getMutedColor() {
  return document.documentElement.getAttribute('data-theme')==='dark'?'#5a5a72':'#9090a8';
}

function drawDonut(id,labels,data,colors) {
  const canvas=document.getElementById(id); if(!canvas)return;
  const W=canvas.width=canvas.offsetWidth, H=canvas.height=120;
  const ctx=canvas.getContext('2d');
  const total=data.reduce((a,b)=>a+b,0);
  if(!total){ctx.fillStyle=getMutedColor();ctx.font='11px Outfit';ctx.textAlign='center';ctx.fillText('Sin datos',W/2,H/2);return;}
  const cx=W/2,cy=H/2,r=Math.min(cx,cy)-6,inner=r*0.58;
  let angle=-Math.PI/2;
  data.forEach((val,i)=>{
    if(!val)return;
    const slice=(val/total)*Math.PI*2;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,angle,angle+slice);ctx.closePath();
    ctx.fillStyle=colors[i];ctx.fill();angle+=slice;
  });
  ctx.beginPath();ctx.arc(cx,cy,inner,0,Math.PI*2);ctx.fillStyle=getBgColor();ctx.fill();
  ctx.fillStyle=getTextColor();ctx.font='bold 11px JetBrains Mono';ctx.textAlign='center';
  ctx.fillText(fmt(total),cx,cy+4);
}
function drawBars(id,labels,data,colors) {
  const canvas=document.getElementById(id); if(!canvas||!data.length)return;
  const W=canvas.width=canvas.offsetWidth, H=canvas.height=140;
  const ctx=canvas.getContext('2d');
  const max=Math.max(...data),pad=5,barW=Math.floor((W-pad*(labels.length+1))/labels.length),chartH=H-22;
  data.forEach((val,i)=>{
    const x=pad+i*(barW+pad),barH=max>0?Math.round((val/max)*chartH*0.88):0,y=chartH-barH;
    ctx.fillStyle=colors[i]+'77';ctx.beginPath();ctx.roundRect(x,y,barW,barH,[3,3,0,0]);ctx.fill();
    ctx.fillStyle=colors[i];ctx.beginPath();ctx.roundRect(x,y,barW,Math.min(3,barH),[3,3,0,0]);ctx.fill();
    ctx.fillStyle=getMutedColor();ctx.font='8px Outfit';ctx.textAlign='center';
    ctx.fillText((labels[i]||'').slice(0,5),x+barW/2,H-4);
  });
}
function drawBarsH(id,labels,data,colors) {
  const canvas=document.getElementById(id); if(!canvas)return;
  const W=canvas.width=canvas.offsetWidth, H=canvas.height=85;
  const ctx=canvas.getContext('2d');
  const max=Math.max(...data,1),lW=52,pad=6,rowH=Math.floor((H-pad*(labels.length+1))/labels.length);
  data.forEach((val,i)=>{
    const y=pad+i*(rowH+pad),bW=Math.round((val/max)*(W-lW-pad*2));
    ctx.fillStyle=colors[i]+'33';ctx.beginPath();ctx.roundRect(lW,y,W-lW-pad,rowH,3);ctx.fill();
    if(bW>0){ctx.fillStyle=colors[i];ctx.beginPath();ctx.roundRect(lW,y,bW,rowH,3);ctx.fill();}
    ctx.fillStyle=getTextColor();ctx.font='10px Outfit';ctx.textAlign='right';ctx.fillText(labels[i],lW-5,y+rowH/2+4);
    ctx.fillStyle=getMutedColor();ctx.font='8px JetBrains Mono';ctx.textAlign='left';ctx.fillText(fmt(val),lW+bW+5,y+rowH/2+4);
  });
}

function exportExcel() {
  const {gastos,ingresos,tarjetas}=state;
  const mes=MONTHS[state.mes-1]+' '+state.anio;
  const wb=XLSX.utils.book_new();
  const totalInc=ingresos.reduce((a,i)=>a+parseFloat(i.monto),0);
  const totalGas=gastos.reduce((a,g)=>a+parseFloat(g.monto),0);
  const fijos=gastos.filter(g=>g.tipo==='fijo').reduce((a,g)=>a+parseFloat(g.monto),0);

  const ws1=XLSX.utils.aoa_to_sheet([['NuestrasFinanzas — '+mes],[],['RESUMEN',''],
    ['Total Ingresos',totalInc],['Total Gastos',totalGas],['Fijos',fijos],
    ['Variables',totalGas-fijos],['Saldo',totalInc-totalGas],
    ['% gastado',totalInc>0?Math.round(totalGas/totalInc*100)+'%':'—']]);
  ws1['!cols']=[{wch:28},{wch:16}];
  XLSX.utils.book_append_sheet(wb,ws1,'Resumen');

  const ws2=XLSX.utils.aoa_to_sheet([['Descripción','Monto','Quién','Tipo'],
    ...ingresos.map(i=>[i.descripcion,parseFloat(i.monto),i.quien,i.tipo]),[],['TOTAL',totalInc]]);
  XLSX.utils.book_append_sheet(wb,ws2,'Ingresos');

  const ws3=XLSX.utils.aoa_to_sheet([['Descripción','Monto','Categoría','Tipo','Medio','Quién','Día','Cuotas'],
    ...[...gastos].sort((a,b)=>(a.dia||99)-(b.dia||99)).map(g=>{
      const t=g.tarjeta_id?tarjetas.find(t=>t.id===g.tarjeta_id)?.nombre||'Tarjeta':'—';
      return [g.descripcion,parseFloat(g.monto),g.cat,g.tipo,g.medio==='tarjeta'?t:'Efectivo/Déb.',g.quien,g.dia||'',g.cuotas>1?`${g.cuota_actual}/${g.cuotas}`:''];
    }),[],['TOTAL',totalGas]]);
  XLSX.utils.book_append_sheet(wb,ws3,'Gastos');

  const catTotals={};
  gastos.forEach(g=>{catTotals[g.cat]=(catTotals[g.cat]||0)+parseFloat(g.monto);});
  const ws4=XLSX.utils.aoa_to_sheet([['Categoría','Monto','% del total'],
    ...Object.entries(catTotals).sort((a,b)=>b[1]-a[1]).map(([cat,m])=>[cat,m,totalGas>0?Math.round(m/totalGas*100)+'%':'—'])]);
  XLSX.utils.book_append_sheet(wb,ws4,'Por Categoría');

  XLSX.writeFile(wb,`NuestrasFinanzas_${MONTHS[state.mes-1]}_${state.anio}.xlsx`);
  toast('✅ Excel descargado');
}

}

// AUTH
// ============================================
function hashPin(pin){let h=0;for(let i=0;i<pin.length;i++)h=Math.imul(31,h)+pin.charCodeAt(i)|0;return h.toString(36);}
function isSession(){const s=sessionStorage.getItem('nf_sess');return s&&(Date.now()-parseInt(s))<30*60*1000;}
function unlock(){
  sessionStorage.setItem('nf_sess',Date.now().toString());
  const l=document.getElementById('lockScreen');
  l.style.transition='opacity 0.35s';l.style.opacity='0';
  setTimeout(()=>{l.style.display='none';},350);
}
async function tryBiometric(){
  if(window.PublicKeyCredential){
    try{
      const avail=await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
      if(avail){
        const stored=localStorage.getItem('nf_cid');
        if(stored){
          const credId=Uint8Array.from(atob(stored),c=>c.charCodeAt(0));
          const a=await navigator.credentials.get({publicKey:{challenge:crypto.getRandomValues(new Uint8Array(32)),allowCredentials:[{id:credId,type:'public-key'}],userVerification:'required',timeout:60000}});
          if(a){unlock();return;}
        } else {
          const r=await navigator.credentials.create({publicKey:{challenge:crypto.getRandomValues(new Uint8Array(32)),rp:{name:'NuestrasFinanzas',id:location.hostname},user:{id:new Uint8Array(16),name:'nacho-celi',displayName:'Nacho & Celi'},pubKeyCredParams:[{alg:-7,type:'public-key'},{alg:-257,type:'public-key'}],authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required'},timeout:60000}});
          if(r){localStorage.setItem('nf_cid',btoa(String.fromCharCode(...new Uint8Array(r.rawId))));unlock();return;}
        }
      }
    }catch(e){console.log('Bio failed',e.message);}
  }
  showPin();
}
function showPin(){
  document.querySelector('.lock-btn').style.display='none';
  document.getElementById('lockHint').style.display='none';
  document.getElementById('pinWrap').style.display='flex';
  document.getElementById('pinHint2').textContent=localStorage.getItem('nf_pin')?'Ingresá tu PIN':'Primera vez: creá tu PIN';
}
let pinBuf='';
function pinPress(v){
  const err=document.getElementById('pinErr');
  if(v==='del'){pinBuf=pinBuf.slice(0,-1);}
  else if(v==='ok'){
    const stored=localStorage.getItem('nf_pin');
    if(!stored){if(pinBuf.length===4){localStorage.setItem('nf_pin',hashPin(pinBuf));unlock();}else{err.textContent='El PIN debe tener 4 dígitos';}}
    else{if(hashPin(pinBuf)===stored){err.textContent='';unlock();}else{err.textContent='PIN incorrecto';pinBuf='';updatePinDots();}}
    return;
  } else if(pinBuf.length<4){pinBuf+=v;}
  updatePinDots(); err.textContent='';
  if(pinBuf.length===4&&localStorage.getItem('nf_pin'))setTimeout(()=>pinPress('ok'),200);
}
function updatePinDots(){for(let i=0;i<4;i++)document.getElementById('pd'+i).classList.toggle('filled',i<pinBuf.length);}

async function init() {
  initTheme();

    document.getElementById('lockScreen').style.display='none';
  } else {
    document.getElementById('lockScreen').style.display='flex';
    setTimeout(tryBiometric, 500);
  }
  try {
    await loadAll();

    document.getElementById('appMain').style.display='block';
  } catch(e) {
    document.querySelector('.loader-sub').textContent='❌ Error de conexión';
  }
}

// Override renderAll to use new CSS classes
const _origRenderAll = renderAll;
renderAll = function() {
  const {gastos,ingresos,tarjetas} = state;
  const totalInc = ingresos.reduce((a,i)=>a+parseFloat(i.monto),0);
  const totalGas = gastos.reduce((a,g)=>a+parseFloat(g.monto),0);
  const fijos = gastos.filter(g=>g.tipo==='fijo').reduce((a,g)=>a+parseFloat(g.monto),0);
  const variables = gastos.filter(g=>g.tipo==='variable').reduce((a,g)=>a+parseFloat(g.monto),0);
  const enTarjeta = gastos.filter(g=>g.medio==='tarjeta').reduce((a,g)=>a+parseFloat(g.monto),0);
  const saldo = totalInc-totalGas;
  const pct = totalInc>0?Math.min(100,Math.round(totalGas/totalInc*100)):0;

  // SUMMARY
  document.getElementById('summary').innerHTML = `
    <div class="scard">
      <div class="sc-label">Ingresos</div>
      <div class="sc-value teal">${fmt(totalInc)}</div>
      <div class="sc-sub">Nacho + Celi</div>
    </div>
    <div class="scard">
      <div class="sc-label">Gastos</div>
      <div class="sc-value red">${fmt(totalGas)}</div>
      <div class="sc-sub">${pct}% del ingreso</div>
      <div class="sc-bar"><div class="sc-fill" style="width:${pct}%;background:${pct>80?'var(--red)':pct>60?'var(--sun)':'var(--teal)'}"></div></div>
    </div>
    <div class="scard">
      <div class="sc-label">Fijos</div>
      <div class="sc-value navy">${fmt(fijos)}</div>
      <div class="sc-sub">${totalGas>0?Math.round(fijos/totalGas*100):0}% del total</div>
    </div>
    <div class="scard">
      <div class="sc-label">Flujo libre</div>
      <div class="sc-value ${saldo>=0?'teal':'red'}">${fmt(saldo)}</div>
      <div class="sc-sub">${saldo>=0?'disponible':'déficit'}</div>
    </div>`;

  // INGRESOS
  const iEl = document.getElementById('ingresoList');
  if (!ingresos.length) {
    iEl.innerHTML = `<div class="empty"><div class="empty-icon">💸</div><div class="empty-text">Agregá tus ingresos del mes</div></div>`;
  } else {
    const groups = {'Nacho':[],'Celi':[],'Compartido':[]};
    ingresos.forEach(i=>(groups[i.quien]||[]).push(i));
    iEl.innerHTML = Object.entries(groups).filter(([,v])=>v.length>0).map(([quien,items])=>`
      <div style="margin-bottom:10px">
        <div class="group-label">${quien}</div>
        ${items.map(i=>`
          <div class="item" style="margin-bottom:5px">
            <div class="item-accent" style="background:var(--green)"></div>
            <div class="item-info">
              <div class="item-name">${i.descripcion||''}</div>
              <div class="item-meta"><span class="chip chip-${i.tipo==='fijo'?'fijo':'var'}">${i.tipo}</span></div>
            </div>
            <div class="item-amount" style="color:var(--green)">${fmt(i.monto)}</div>
            <div class="item-actions">
              <button class="ibtn edit" onclick="editIngreso('${i.id}')">✏️</button>
              <button class="ibtn del" onclick="deleteIngreso('${i.id}')">✕</button>
            </div>
          </div>`).join('')}
      </div>`).join('');
  }

  // GASTOS
  const gEl = document.getElementById('gastoList');
  if (!gastos.length) {
    gEl.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Sin gastos este mes</div></div>`;
  } else {
    const sorted = [...gastos].sort((a,b)=>(a.dia||99)-(b.dia||99));
    gEl.innerHTML = sorted.map(g=>{
      const t = g.tarjeta_id?tarjetas.find(t=>t.id===g.tarjeta_id):null;
      const isCuota = g.cuotas>1;
      return `<div class="item">
        <div class="item-accent" style="background:${CAT_COLORS[g.cat]||'#888'}"></div>
        <div class="item-info">
          <div class="item-name">${g.descripcion||''}${isCuota?` <span style="color:var(--text3);font-size:0.72rem;font-weight:400">(${g.cuota_actual}/${g.cuotas})</span>`:''}</div>
          <div class="item-meta">
            <span class="chip chip-${g.tipo==='fijo'?'fijo':'var'}">${g.tipo==='fijo'?'Fijo':'Var'}</span>
            <span class="chip chip-${g.medio==='tarjeta'?'card':'cash'}">${g.medio==='tarjeta'?(t?t.nombre:'Tarjeta'):'Efectivo'}</span>
            ${isCuota?`<span class="chip chip-cuota">Cuotas</span>`:''}
            <span style="font-size:0.68rem;color:var(--text3)">${g.quien}</span>
            ${g.dia?`<span style="font-size:0.68rem;color:var(--text3)">día ${g.dia}</span>`:''}
          </div>
        </div>
        <div class="item-amount">${fmt(g.monto)}</div>
        <div class="item-actions">
          <button class="ibtn edit" onclick="editGasto('${g.id}')">✏️</button>
          <button class="ibtn del" onclick="deleteGasto('${g.id}')">✕</button>
        </div>
      </div>`;
    }).join('');
  }

  // TARJETAS
  const tEl = document.getElementById('tarjetasList');
  if (!tarjetas.length) {
    tEl.innerHTML = `<div class="empty"><div class="empty-icon">💳</div><div class="empty-text">Agregá tus tarjetas</div></div>`;
  } else {
    const MS = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    tEl.innerHTML = tarjetas.map(t=>{
      const tG = gastos.filter(g=>g.tarjeta_id===t.id);
      const tTot = tG.reduce((a,g)=>a+parseFloat(g.monto),0);
      const cierreStr = t.cierre?(t.cierre+(t.cierre_mes?'/'+MS[t.cierre_mes-1]:'')):'?';
      const vencStr = t.vencimiento?(t.vencimiento+(t.venc_mes?'/'+MS[t.venc_mes-1]:'')):'?';
      return `<div class="tcard">
        <div class="tcard-head">
          <div>
            <div class="tcard-name">💳 ${t.nombre}</div>
            <div class="tcard-meta">${t.titular} · Cierra ${cierreStr} · Vence ${vencStr}</div>
          </div>
          <div style="text-align:right">
            <div class="tcard-total">${fmt(tTot)}</div>
            <div style="display:flex;gap:4px;margin-top:6px;justify-content:flex-end">
              <button class="ibtn edit" onclick="editTarjeta('${t.id}')" style="border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:0.72rem">✏️ Editar</button>
              <button class="ibtn del" onclick="deleteTarjeta('${t.id}')" style="border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:0.72rem">✕</button>
            </div>
          </div>
        </div>
        ${!tG.length?`<div style="font-size:0.8rem;color:var(--text3)">Sin gastos en esta tarjeta</div>`:
          tG.map(g=>`<div class="tcard-item">
            <span>${g.descripcion||''} ${g.cuotas>1?`<span style="color:var(--text3);font-size:0.7rem">(${g.cuota_actual}/${g.cuotas})</span>`:''}</span>
            <span class="tcard-item-amount">${fmt(g.monto)}</span>
          </div>`).join('')}
      </div>`;
    }).join('');
  }

  // CATEGORIAS
  const catTotals={};
  gastos.forEach(g=>{catTotals[g.cat]=(catTotals[g.cat]||0)+parseFloat(g.monto);});
  const catSorted=Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);
  const catMax=catSorted[0]?.[1]||1;
  document.getElementById('catList').innerHTML = catSorted.length===0
    ?`<div class="empty"><div class="empty-icon">📊</div><div class="empty-text">Sin datos aún</div></div>`
    :catSorted.map(([cat,tot])=>`
      <div class="cat-row">
        <div class="cat-name">${cat}</div>
        <div class="cat-bg"><div class="cat-fill" style="width:${Math.round(tot/catMax*100)}%;background:${CAT_COLORS[cat]||'#888'}"></div></div>
        <div class="cat-amt">${fmt(tot)}</div>
      </div>`).join('');

  // FLUJO
  const nachoInc=ingresos.filter(i=>i.quien==='Nacho').reduce((a,i)=>a+parseFloat(i.monto),0);
  const celiInc=ingresos.filter(i=>i.quien==='Celi').reduce((a,i)=>a+parseFloat(i.monto),0);
  const compInc=ingresos.filter(i=>i.quien==='Compartido').reduce((a,i)=>a+parseFloat(i.monto),0);
  document.getElementById('flujoContent').innerHTML = `
    <div style="height:12px"></div>
    <div class="fcard">
      <div class="fcard-title">🏦 Flujo mensual</div>
      ${nachoInc>0?`<div class="frow"><span class="frow-label">Ingresos Nacho</span><span class="frow-val" style="color:var(--green)">${fmt(nachoInc)}</span></div>`:''}
      ${celiInc>0?`<div class="frow"><span class="frow-label">Ingresos Celi</span><span class="frow-val" style="color:var(--green)">${fmt(celiInc)}</span></div>`:''}
      ${compInc>0?`<div class="frow"><span class="frow-label">Compartido</span><span class="frow-val" style="color:var(--green)">${fmt(compInc)}</span></div>`:''}
      <div class="frow"><span class="frow-label" style="font-weight:700;color:var(--text)">Total ingresos</span><span class="frow-val" style="color:var(--green)">${fmt(totalInc)}</span></div>
      <div class="frow"><span class="frow-label">Gastos fijos</span><span class="frow-val" style="color:var(--lavender)">${fmt(fijos)}</span></div>
      <div class="frow"><span class="frow-label">Flujo tras fijos</span><span class="frow-val">${fmt(totalInc-fijos)}</span></div>
      <div class="frow"><span class="frow-label">Gastos variables</span><span class="frow-val" style="color:var(--text3)">${fmt(variables)}</span></div>
      <div class="frow"><span class="frow-label">En tarjeta</span><span class="frow-val" style="color:var(--teal)">${fmt(enTarjeta)}</span></div>
      <div class="frow hl"><span class="frow-label">💰 Flujo libre</span><span class="frow-val" style="color:${saldo>=0?'var(--green)':'var(--red)'}">${fmt(saldo)}</span></div>
    </div>
    <div class="sec-head"><div class="sec-title">🎯 Metas de ahorro</div></div>
    ${totalInc===0?`<div class="empty"><div class="empty-text">Agregá ingresos para ver las metas</div></div>`:`
    <div class="meta-grid">
      <div class="meta-c"><div class="meta-label">10%</div><div class="meta-val">${fmt(totalInc*.1)}</div></div>
      <div class="meta-c"><div class="meta-label">20%</div><div class="meta-val">${fmt(totalInc*.2)}</div></div>
      <div class="meta-c"><div class="meta-label">Real</div><div class="meta-val" style="color:${saldo>=0?'var(--green)':'var(--red)'}">${fmt(Math.max(0,saldo))}</div></div>
    </div>`}`;
};

// Override renderInforme
renderInforme = function() {
  const {gastos,ingresos}=state;
  const totalInc=ingresos.reduce((a,i)=>a+parseFloat(i.monto),0);
  const totalGas=gastos.reduce((a,g)=>a+parseFloat(g.monto),0);
  const fijos=gastos.filter(g=>g.tipo==='fijo').reduce((a,g)=>a+parseFloat(g.monto),0);
  const variables=gastos.filter(g=>g.tipo==='variable').reduce((a,g)=>a+parseFloat(g.monto),0);
  const saldo=totalInc-totalGas;
  const catTotals={};
  gastos.forEach(g=>{catTotals[g.cat]=(catTotals[g.cat]||0)+parseFloat(g.monto);});
  const catSorted=Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);
  const nachoInc=ingresos.filter(i=>i.quien==='Nacho').reduce((a,i)=>a+parseFloat(i.monto),0);
  const celiInc=ingresos.filter(i=>i.quien==='Celi').reduce((a,i)=>a+parseFloat(i.monto),0);
  const compInc=ingresos.filter(i=>i.quien==='Compartido').reduce((a,i)=>a+parseFloat(i.monto),0);
  const nachoG=gastos.filter(g=>g.quien==='Nacho').reduce((a,g)=>a+parseFloat(g.monto),0);
  const celiG=gastos.filter(g=>g.quien==='Celi').reduce((a,g)=>a+parseFloat(g.monto),0);
  const ambosG=gastos.filter(g=>g.quien==='Ambos').reduce((a,g)=>a+parseFloat(g.monto),0);

  document.getElementById('informeContent').innerHTML=`
    <div class="inf-grid">
      <div class="inf-c"><div class="sc-label">Ingresos</div><div class="sc-value teal" style="font-size:1rem">${fmt(totalInc)}</div></div>
      <div class="inf-c"><div class="sc-label">Gastos</div><div class="sc-value red" style="font-size:1rem">${fmt(totalGas)}</div></div>
      <div class="inf-c"><div class="sc-label">Saldo</div><div class="sc-value ${saldo>=0?'teal':'red'}" style="font-size:1rem">${fmt(saldo)}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
      <div class="chart-card">
        <div class="chart-title">Por persona</div>
        <canvas id="cIngresos" height="110"></canvas>
        <div style="margin-top:8px">
          ${nachoInc>0?`<div class="legend-item"><span><span class="legend-dot" style="background:#1a2b5e"></span>Nacho</span><span style="font-family:var(--font-display);font-weight:700;font-size:0.75rem">${fmt(nachoInc)}</span></div>`:''}
          ${celiInc>0?`<div class="legend-item"><span><span class="legend-dot" style="background:#00b4a6"></span>Celi</span><span style="font-family:var(--font-display);font-weight:700;font-size:0.75rem">${fmt(celiInc)}</span></div>`:''}
          ${compInc>0?`<div class="legend-item"><span><span class="legend-dot" style="background:#f5c842"></span>Comp.</span><span style="font-family:var(--font-display);font-weight:700;font-size:0.75rem">${fmt(compInc)}</span></div>`:''}
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Fijos vs Var.</div>
        <canvas id="cTipos" height="110"></canvas>
        <div style="margin-top:8px">
          ${fijos>0?`<div class="legend-item"><span><span class="legend-dot" style="background:#1a2b5e"></span>Fijos</span><span style="font-family:var(--font-display);font-weight:700;font-size:0.75rem">${fmt(fijos)}</span></div>`:''}
          ${variables>0?`<div class="legend-item"><span><span class="legend-dot" style="background:#ef4444"></span>Var.</span><span style="font-family:var(--font-display);font-weight:700;font-size:0.75rem">${fmt(variables)}</span></div>`:''}
        </div>
      </div>
    </div>
    <div class="chart-card" style="margin-bottom:10px">
      <div class="chart-title">Gastos por categoría</div>
      <canvas id="cCat" height="140"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">Por integrante</div>
      <canvas id="cPersonas" height="85"></canvas>
    </div>`;

  setTimeout(()=>{
    drawDonut('cIngresos',['Nacho','Celi','Comp.'],[nachoInc,celiInc,compInc],['#1a2b5e','#00b4a6','#f5c842']);
    drawDonut('cTipos',['Fijos','Variables'],[fijos,variables],['#1a2b5e','#ef4444']);
    drawBars('cCat',catSorted.map(([k])=>k),catSorted.map(([,v])=>v),catSorted.map(([k])=>CAT_COLORS[k]||'#888'));
    drawBarsH('cPersonas',['Nacho','Celi','Ambos'],[nachoG,celiG,ambosG],['#1a2b5e','#00b4a6','#f5c842']);
  },60);
};
